<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { font-family: 'Inter', sans-serif; }
    html { scroll-behavior: smooth; }
    body {
      background: #fcfcfa;
      color: #1f2937;
    }

    .glass {
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(14px);
    }

    .smart-search-badge {
      position: fixed;
      right: 18px;
      top: 92px;
      z-index: 45;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #111827;
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      animation: smartBlink 1.8s infinite;
    }

    @keyframes smartBlink {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.55), 0 10px 24px rgba(0,0,0,0.18); transform: scale(1); }
      50% { box-shadow: 0 0 0 10px rgba(16,185,129,0.0), 0 10px 24px rgba(0,0,0,0.18); transform: scale(1.03); }
    }

    .hero-wrapper {
      border: 1px solid #e5e7eb;
      border-radius: 28px;
      overflow: hidden;
      background: white;
      margin-bottom: 22px;
    }

    .hero-cover {
      position: relative;
      width: 100%;
      height: 340px;
      overflow: hidden;
      background: #e5e7eb;
    }

    .hero-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.42), rgba(0,0,0,.05));
    }

    .hero-caption {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 22px;
      color: white;
      z-index: 2;
    }

    .recommended-strip {
      padding: 18px;
      background: #fff;
      border-top: 1px solid #f1f5f9;
    }

    .recommended-row {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .recommended-card {
      min-width: 220px;
      max-width: 220px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: .2s ease;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .recommended-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.10);
    }

    .recommended-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .sidebar-item {
      transition: .2s ease;
      cursor: pointer;
      padding: 12px 14px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }

    .sidebar-item:hover {
      background: #f3f4f6;
      color: #059669;
    }

    .sidebar-item.active {
      background: #ecfdf5;
      color: #059669;
      font-weight: 700;
    }

    .category-pill {
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      transition: .2s ease;
    }

    .category-pill:hover {
      border-color: #10b981;
      color: #059669;
    }

    .category-pill.active {
      background: #059669;
      color: #fff;
      border-color: #059669;
    }

    .product-card {
      border-bottom: 1px dashed #e5e7eb;
      padding: 22px 0;
      scroll-margin-top: 110px;
    }

    .product-card:last-child { border-bottom: none; }

    .product-card.salad-product {
      padding: 28px 0;
    }

    .product-card.salad-product .image-gallery {
      width: 154px;
      height: 214px;
    }

    .product-card.salad-product .gallery-image {
      object-fit: cover;
      background: #f3f4f6;
    }

    .product-card.salad-product .product-title {
      font-size: 1.42rem;

    }

    .product-card.salad-product .product-desc {
      font-size: .98rem;
      color: #4b5563;
    }

    .product-card.salad-product .price-tag {
      font-size: 1.3rem;
    }

    .image-gallery {
      position: relative;
      width: 116px;
      height: 154px;
      flex-shrink: 0;
      cursor: pointer;
      border-radius: 18px;
      overflow: hidden;
      background: #f8fafc;
      border: 1px solid #edf2f7;

    .gallery-image {

      inset: 0;

      object-fit: contain;

    .gallery-image.active {

    }

      transform: scale(.95);

    .gallery-nav {
      position: absolute;

      left: 50%;

      height: 42px;
      border-radius: 12px;

      justify-content: center;

    .favorite-btn:hover {
      border-color: #ef4444;

    .favorite-btn.active {
      background: #ef4444;
      color: #fff;

    }

    .search-box:focus-within {

    .search-highlight {

    .mobile-bottom-bar {

    .product-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .product-modal.active { display: flex; }

    .product-modal-card {
      width: 100%;
      max-width: 640px;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(0,0,0,0.2);

    @keyframes modalPop {

    .product-modal-cover {
      width: 100%;

      display: block;

    .product-modal-close {

      top: 18px;

      height: 58px;

      border: none;
      background: rgba(194, 163, 69, 0.95);

      font-size: 24px;

      from { opacity: 0; transform: translateY(16px); }

    .line-clamp-2 {
      display: -webkit-box;

  <script>
    const CONFIG = {
      GAS_URL: 'https://script.google.com/macros/s/AKfycbxJWy0E1FVY4_3lOPav_by9vt9cIC2Xzj2qvCfr6bspkGYZgA4KU4oCPIC3DkDsT3Lk_Q/exec',
      GALLERY_INTERVAL: 3500
    };

    let currentLang = 'en';
    let categories = [];
    let products = [];
    let settings = {};
    let favorites = JSON.parse(localStorage.getItem('menu_favorites') || '[]');

    let currentCategory = null;
    let currentFilterMode = 'category';
    let searchQuery = '';

    const galleryIntervals = new Map();

    function safeText(v) {
      return v == null ? '' : String(v);
    }

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function normalizeText(str) {
      const map = {
        'ə':'e','Ə':'e','ı':'i','I':'i','İ':'i','ö':'o','Ö':'o',
        'ğ':'g','Ğ':'g','ü':'u','Ü':'u','ş':'s','Ş':'s','ç':'c','Ç':'c'
      };

      return safeText(str)
        .split('')
        .map(ch => map[ch] || ch)
        .join('')
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\s]/gu, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function tokenize(str) {
      return normalizeText(str).split(' ').filter(Boolean);
    }

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      if (!m) return n;
      if (!n) return m;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;

      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + cost
          );
        }
      }
      return dp[m][n];
    }

    function fuzzyWordSimilarity(a, b) {
      if (!a || !b) return 0;
      if (a === b) return 1;
      if (a.includes(b) || b.includes(a)) return 0.9;
      const dist = levenshtein(a, b);
      const maxLen = Math.max(a.length, b.length);
      return Math.max(0, 1 - dist / maxLen);
    }

    function getCategoryById(id) {
      return categories.find(c => Number(c.id) === Number(id));
    }

    function getLocalizedCategoryName(cat) {
      if (!cat) return '';
      return currentLang === 'az'
        ? (cat.nameAz || cat.nameEn || '')
        : (cat.nameEn || cat.nameAz || '');
    }

    function getLocalizedProductName(product) {
      return currentLang === 'az'
        ? (product.nameAz || product.nameEn || '')
        : (product.nameEn || product.nameAz || '');
    }

    function getLocalizedProductDesc(product) {
      return currentLang === 'az'
        ? (product.descAz || product.descEn || '')
        : (product.descEn || product.descAz || '');
    }

    function buildSearchIndex(product) {
      const category = getCategoryById(product.categoryId);
      const corpus = [
        product.nameAz,
        product.nameEn,
        product.descAz,
        product.descEn,
        category?.nameAz,
        category?.nameEn,
        product.categoryName
      ].map(safeText).join(' ');

      return {
        normalized: normalizeText(corpus),
        tokens: tokenize(corpus)
      };
    }

    function scoreProduct(product, query) {
      const q = normalizeText(query);
      if (!q) return 0;

      const qTokens = tokenize(q);
      const category = getCategoryById(product.categoryId);
      const index = buildSearchIndex(product);

      const fields = {
        nameAz: normalizeText(product.nameAz),
        nameEn: normalizeText(product.nameEn),
        descAz: normalizeText(product.descAz),
        descEn: normalizeText(product.descEn),
        categoryAz: normalizeText(category?.nameAz || ''),
        categoryEn: normalizeText(category?.nameEn || '')
      };

      let score = 0;

      Object.values(fields).forEach(val => {
        if (!val) return;
        if (val === q) score += 140;
        if (val.startsWith(q)) score += 80;
        if (val.includes(q)) score += 55;
      });

      qTokens.forEach(qt => {
        index.tokens.forEach(token => {
          const sim = fuzzyWordSimilarity(qt, token);
          if (sim >= 0.98) score += 30;
          else if (sim >= 0.9) score += 18;
          else if (sim >= 0.8) score += 10;
          else if (sim >= 0.72) score += 5;
        });
      });

      qTokens.forEach(qt => {
        [fields.nameAz, fields.nameEn].forEach(nameField => {
          tokenize(nameField).forEach(tok => {
            const sim = fuzzyWordSimilarity(qt, tok);
            if (sim >= 0.98) score += 42;
            else if (sim >= 0.9) score += 28;
            else if (sim >= 0.8) score += 14;
          });
        });
      });

      qTokens.forEach(qt => {
        [fields.descAz, fields.descEn].forEach(descField => {
          tokenize(descField).forEach(tok => {
            const sim = fuzzyWordSimilarity(qt, tok);
            if (sim >= 0.98) score += 14;
            else if (sim >= 0.9) score += 9;
            else if (sim >= 0.8) score += 4;
          });
        });
      });

      qTokens.forEach(qt => {
        [fields.categoryAz, fields.categoryEn].forEach(catField => {
          tokenize(catField).forEach(tok => {
            const sim = fuzzyWordSimilarity(qt, tok);
            if (sim >= 0.98) score += 18;
            else if (sim >= 0.9) score += 12;
            else if (sim >= 0.8) score += 6;
          });
        });
      });

      if (product.popular) score += 4;
      return score;
    }

    function getSearchResults(query) {
      const availableProducts = products.filter(p => p.available !== false);

      return availableProducts
        .map(product => ({ product, score: scoreProduct(product, query) }))
        .filter(item => item.score > 12)
        .sort((a, b) => b.score - a.score)
        .map(item => item.product);
    }

    function highlightMatch(text, query) {
      if (!query || !text) return escapeHtml(text);
      const escaped = escapeHtml(text);
      const q = safeText(query).trim();
      if (!q) return escaped;

      try {
        const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'ig');
        return escaped.replace(regex, '<span class="search-highlight">$1</span>');
      } catch {
        return escaped;
      }
    }

    function updateCurrentHeaders() {
      const title = document.getElementById('current-category');

        subtitle.textContent = currentLang === 'az' ? 'Bəyəndiyiniz məhsullar' : 'Items you liked';

    function selectCategory(categoryId) {
      currentCategory = Number(categoryId);
      currentFilterMode = 'category';
      searchQuery = '';
      clearSearchInputs();
      renderCategories();
      renderProducts();

      const firstCard = document.querySelector(`.product-card[data-category-id="${Number(categoryId)}"]`);
      if (firstCard && window.innerWidth < 1024) {
        firstCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function filterPopular() {
      currentFilterMode = 'popular';
      searchQuery = '';
      clearSearchInputs();
      renderCategories();
      renderProducts();
    }

    function showFavoritesOnly() {
      currentFilterMode = 'favorites';
      searchQuery = '';
      clearSearchInputs();
      renderCategories();
      renderProducts();
    }

    function clearSearchInputs() {
      const desktop = document.getElementById('search-input');
      const mobile = document.getElementById('mobile-search-input');
      if (desktop) desktop.value = '';
      if (mobile) mobile.value = '';
    }

    function smartSearch(query) {
      searchQuery = safeText(query).trim();

      const desktop = document.getElementById('search-input');
      const mobile = document.getElementById('mobile-search-input');

      if (desktop && desktop.value !== searchQuery) desktop.value = searchQuery;
      if (mobile && mobile.value !== searchQuery) mobile.value = searchQuery;

      if (!searchQuery) {
        currentFilterMode = 'category';
        renderCategories();
        renderProducts();
        return;
      }

      currentFilterMode = 'search';
      renderCategories();
      renderProducts();
    }

    function renderProducts() {
      const container = document.getElementById('products-list');
      clearGalleryIntervals();

      let filtered = products.filter(p => p.available !== false);

      if (currentFilterMode === 'popular') {
        filtered = filtered.filter(p => p.popular);
      } else if (currentFilterMode === 'favorites') {
        filtered = filtered.filter(p => favorites.includes(p.id));
      } else if (currentFilterMode === 'search') {
        filtered = getSearchResults(searchQuery);
      } else {
        filtered = filtered.filter(p => Number(p.categoryId) === Number(currentCategory));
      }

      updateCurrentHeaders();

      if (!filtered.length) {
        container.innerHTML = `
          <div class="text-center py-14">
            <div class="w-20 h-20 rounded-full bg-gray-100 mx-auto flex items-center justify-center mb-4">
              <i class="fas fa-search text-2xl text-gray-300"></i>
            </div>
            <p class="text-gray-500 font-medium">${currentLang === 'az' ? 'Məhsul tapılmadı' : 'No products found'}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map((product, index) => {
        const category = getCategoryById(product.categoryId);
        const categoryNameAz = normalizeText(category?.nameAz || '');
        const categoryNameEn = normalizeText(category?.nameEn || '');
        const isSaladCategory = categoryNameAz.includes('salat') || categoryNameEn.includes('salad');

        const name = getLocalizedProductName(product);
        const desc = getLocalizedProductDesc(product);
        const displayName = currentFilterMode === 'search'
          ? highlightMatch(name, searchQuery)
          : escapeHtml(name);

        const hasMultipleImages = Array.isArray(product.images) && product.images.length > 1;
        const image1 = product.images?.[0] || 'https://via.placeholder.com/300x400?text=No+Image';
        const image2 = product.images?.[1] || image1;
        const isFavorite = favorites.includes(product.id);

        return `
          <div class="product-card ${isSaladCategory ? 'salad-product' : ''} flex gap-4 sm:gap-5 fade-up"
               id="product-${Number(product.id)}"
               data-category-id="${Number(product.categoryId)}"
               style="animation-delay:${index * 0.04}s">
            <div class="image-gallery" onclick="openProductModal(${Number(product.id)})">
              <img src="${image1}" class="gallery-image active" id="gallery-img-1-${Number(product.id)}">
              <img src="${image2}" class="gallery-image inactive" id="gallery-img-2-${Number(product.id)}">

              ${hasMultipleImages ? `
                <div class="gallery-nav">
                  <div class="gallery-dot active" onclick="event.stopPropagation(); switchGalleryImage(${Number(product.id)}, 1)"></div>
                  <div class="gallery-dot" onclick="event.stopPropagation(); switchGalleryImage(${Number(product.id)}, 2)"></div>
                </div>
              ` : ''}
            </div>

            <div class="flex-1 min-w-0 cursor-pointer" onclick="openProductModal(${Number(product.id)})">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <h3 class="product-title font-bold text-gray-900 text-xl leading-tight mb-2">${displayName}</h3>
                  ${desc ? `<p class="product-desc text-sm text-gray-500 line-clamp-3">${escapeHtml(desc)}</p>` : ''}
                </div>
              </div>

              <div class="flex flex-wrap items-center gap-4 mt-3 text-xs text-gray-400">
                ${product.specs?.volume ? `<span class="flex items-center gap-1"><i class="fas fa-glass-whiskey"></i>${escapeHtml(product.specs.volume)}</span>` : ''}
                ${product.specs?.time ? `<span class="flex items-center gap-1"><i class="far fa-clock"></i>${escapeHtml(product.specs.time)}</span>` : ''}
                ${category ? `<span class="flex items-center gap-1"><i class="fas fa-folder-open"></i>${escapeHtml(getLocalizedCategoryName(category))}</span>` : ''}
              </div>

              <div class="flex items-center justify-between mt-4">
                <span class="price-tag">${product.price} AZN</span>

                <div class="flex items-center gap-2">
                  ${product.popular ? `<span class="text-xs bg-amber-100 text-amber-700 px-2.5 py-1 rounded-full font-semibold"><i class="fas fa-star mr-1"></i>${currentLang === 'az' ? 'Populyar' : 'Popular'}</span>` : ''}
                  <button class="favorite-btn ${isFavorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${Number(product.id)}, this)">
                    <i class="${isFavorite ? 'fas' : 'far'} fa-heart"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      startGalleryRotations(filtered);
    }

    function switchGalleryImage(productId, imageNum) {
      const img1 = document.getElementById(`gallery-img-1-${productId}`);
      const img2 = document.getElementById(`gallery-img-2-${productId}`);
      if (!img1 || !img2) return;

      if (imageNum === 1) {
        img1.classList.add('active');
        img1.classList.remove('inactive');
        img2.classList.remove('active');
        img2.classList.add('inactive');
      } else {
        img2.classList.add('active');
        img2.classList.remove('inactive');
        img1.classList.remove('active');
        img1.classList.add('inactive');
      }

      const dots = img1.parentElement.querySelectorAll('.gallery-dot');
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === imageNum - 1);
      });
    }

    function clearGalleryIntervals() {
      galleryIntervals.forEach(intervalId => clearInterval(intervalId));
      galleryIntervals.clear();
    }

    function startGalleryRotations(filteredProducts) {
      filteredProducts.forEach(product => {
        if (product.images && product.images.length > 1) {
          let current = 1;
          const intId = setInterval(() => {
            current = current === 1 ? 2 : 1;
            switchGalleryImage(Number(product.id), current);
          }, CONFIG.GALLERY_INTERVAL);

          galleryIntervals.set(product.id, intId);
        }
      });
    }

    function toggleFavorite(productId, btn) {
      const idx = favorites.indexOf(productId);

      if (idx > -1) {
        favorites.splice(idx, 1);
        btn.classList.remove('active');
        btn.innerHTML = '<i class="far fa-heart"></i>';
      } else {
        favorites.push(productId);
        btn.classList.add('active');
        btn.innerHTML = '<i class="fas fa-heart"></i>';
      }

      localStorage.setItem('menu_favorites', JSON.stringify(favorites));

      if (currentFilterMode === 'favorites') {
        renderProducts();
      }
    }

    function openProductModal(productId) {
      const product = products.find(p => Number(p.id) === Number(productId));
      if (!product) return;

      const isFavorite = favorites.includes(product.id);
      const modal = document.getElementById('product-modal-card');

      modal.innerHTML = `
        <button class="product-modal-close" onclick="closeProductModal()"><i class="fas fa-times"></i></button>
        <img src="${product.images?.[0] || 'https://via.placeholder.com/1000x700?text=Image'}" class="product-modal-cover" alt="">
        <div class="p-5 md:p-6">
          <h3 class="text-3xl font-extrabold text-gray-900 mb-2">${escapeHtml(getLocalizedProductName(product))}</h3>
          <div class="flex items-center gap-3 flex-wrap mb-3">
            <span class="text-amber-700 text-2xl font-extrabold">${product.price} AZN</span>
            ${product.vat ? `<span class="text-sm font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-xl">${escapeHtml(product.vat)}</span>` : ''}
          </div>
          <p class="text-gray-700 text-lg leading-relaxed mb-5">${escapeHtml(getLocalizedProductDesc(product))}</p>

          <div class="flex items-center gap-3">
            <button class="favorite-btn ${isFavorite ? 'active' : ''}" onclick="toggleFavorite(${Number(product.id)}, this)">
              <i class="${isFavorite ? 'fas' : 'far'} fa-heart"></i>
            </button>
            ${product.popular ? `<span class="text-sm bg-amber-100 text-amber-700 px-3 py-2 rounded-full font-bold"><i class="fas fa-star mr-1"></i>${currentLang === 'az' ? 'Populyar' : 'Popular'}</span>` : ''}
          </div>
        </div>
      `;

      document.getElementById('product-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeProductModal(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('product-modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    function observeProductCards() {
      const observer = new IntersectionObserver((entries) => {
        if (currentFilterMode !== 'category') return;

        const visible = entries
          .filter(e => e.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio);

        if (!visible.length) return;

        const categoryId = Number(visible[0].target.dataset.categoryId);
        if (categoryId && categoryId !== currentCategory) {
          currentCategory = categoryId;
          renderCategories();
        }
      }, {
        threshold: [0.35, 0.6, 0.8]
      });

      const reObserve = () => {
        document.querySelectorAll('.product-card').forEach(card => observer.observe(card));
      };

      const oldRenderProducts = renderProducts;
      renderProducts = function() {
        oldRenderProducts();
        reObserve();
      };
    }

    function toggleLanguage() {
      currentLang = currentLang === 'en' ? 'az' : 'en';
      document.getElementById('current-lang').textContent = currentLang.toUpperCase();

      document.querySelectorAll('[data-az][data-en]').forEach(el => {
        el.textContent = el.getAttribute(`data-${currentLang}`);
      });

      document.getElementById('search-input').placeholder = currentLang === 'az' ? 'Axtar...' : 'Search...';
      document.getElementById('mobile-search-input').placeholder = currentLang === 'az' ? 'Axtar...' : 'Search...';

      renderSmartSearchBadge();
      renderHeroAndRecommended();
      updateSettings();
      renderCategories();
      renderProducts();
    }

    function showMobileCategories() {
      document.getElementById('mobile-categories-modal').classList.remove('hidden');
    }

    function showMobileSearch() {
      document.getElementById('mobile-search-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('mobile-search-input').focus(), 80);
    }

    function closeMobileModal(event, modalId) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById(modalId).classList.add('hidden');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeProductModal();
        closeMobileModal(null, 'mobile-categories-modal');
        closeMobileModal(null, 'mobile-search-modal');
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const table = getUrlParam('table');
      if (table) {
        document.title = `QR Menu - Table ${table}`;
      }
      loadData();
    });
  </script>
</body>
