<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Premium QR Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f8f5;
      --card: #ffffff;
      --text: #1d2939;
      --muted: #667085;
      --line: #e6e8ec;
      --brand: #0f766e;
      --brand-2: #14b8a6;
      --gold: #b35b00;
      --shadow: 0 10px 28px rgba(16, 24, 40, 0.07);
      --radius: 24px;
      --header-h: 72px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 82px;
    }

    @media (min-width: 1024px) {
      body { padding-bottom: 0; }
    }

    .glass {
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(14px);
    }

    .shadow-premium { box-shadow: var(--shadow); }

    .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cfd4dc; border-radius: 999px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }

    .category-pill {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 9px 13px;
      white-space: nowrap;
      transition: .22s ease;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .category-pill:hover { border-color: #99f6e4; }

    .category-pill.active {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: white;
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(20, 184, 166, .24);
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 18px;
      padding: 12px 14px;
      transition: .2s ease;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .sidebar-link:hover { background: #f0f7f6; }

    .sidebar-link.active {
      background: #dff2ec;
      color: #0f766e;
      font-weight: 700;
    }

    .hero {
      position: relative;
      min-height: 480px;
      border-radius: 28px;
      overflow: hidden;
      background: #d4d7dd;
      border: 1px solid var(--line);
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.55) 0%, rgba(0,0,0,.18) 28%, rgba(0,0,0,.03) 55%, rgba(0,0,0,0) 100%);
    }

    .hero-copy {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 18px;
      color: white;
      z-index: 2;
    }

    .ai-search-wrap {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: white;
      min-height: 52px;
      padding: 0 10px 0 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      width: 100%;
    }

    .ai-search-wrap::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(120deg, rgba(20,184,166,.12), rgba(124,58,237,.12), rgba(20,184,166,.12));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: pulseGlow 2.2s linear infinite;
      pointer-events: none;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: .45; }
      50% { opacity: .95; }
    }

    .ai-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #081a32, #112a4b);
      color: white;
      box-shadow: 0 8px 18px rgba(11, 26, 49, 0.2);
      animation: floatBadge 1.9s ease-in-out infinite;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 700;
      border: none;
      max-width: 120px;
      white-space: nowrap;
    }

    @keyframes floatBadge {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .recommended-track {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      padding-bottom: 4px;
    }

    .recommended-card {
      min-width: 200px;
      max-width: 200px;
      border-radius: 22px;
      overflow: hidden;
      background: white;
      border: 1px solid var(--line);
      scroll-snap-align: start;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: .22s ease;
    }

    .recommended-card:hover { transform: translateY(-3px); }

    .recommended-card img {
      width: 100%;
      height: 125px;
      object-fit: cover;
      transition: transform .4s ease;
      display: block;
    }

    .recommended-card:hover img { transform: scale(1.05); }

    .food-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .22s ease, box-shadow .22s ease;
      cursor: pointer;
      transform: translateY(14px);
      opacity: 0;
    }

    .food-card.in-view {
      transform: translateY(0);
      opacity: 1;
      transition: transform .5s cubic-bezier(.2,.8,.2,1), opacity .5s ease;
    }

    .food-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 34px rgba(17, 24, 39, 0.11);
    }

    .food-card-image {
      overflow: hidden;
      height: 165px;
      background: #eef2f6;
    }

    .food-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s ease;
      display: block;
    }

    .food-card:hover .food-card-image img { transform: scale(1.06); }

    .detail-modal {
      position: fixed;
      inset: 0;
      background: rgba(7, 12, 22, .6);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .detail-modal.active { display: flex; }

    .detail-card {
      width: 100%;
      max-width: 690px;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 28px 60px rgba(0,0,0,.24);
      animation: modalRise .22s ease;
      position: relative;
    }

    @keyframes modalRise {
      from { opacity: 0; transform: scale(.97) translateY(14px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .detail-cover {
      width: 100%;
      height: 310px;
      object-fit: cover;
      display: block;
      background: #eef2f6;
    }

    .detail-close {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: none;
      background: rgba(183,121,31,.93);
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    .mobile-bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      padding: 12px 16px;
      display: flex;
      justify-content: space-around;
      z-index: 70;
    }

    @media (min-width: 1024px) {
      .mobile-bottom-bar { display: none; }
    }

    .hide-desktop { display: block; }

    @media (min-width: 1024px) {
      .hide-desktop { display: none; }
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (max-width: 1023px) {
      .hero { min-height: 360px; }
    }

    @media (max-width: 767px) {
      .hero {
        min-height: 265px;
        border-radius: 22px;
      }

      .hero-copy {
        left: 16px;
        right: 16px;
        bottom: 12px;
      }

      .detail-cover { height: 220px; }

      .recommended-card {
        min-width: 165px;
        max-width: 165px;
      }

      .recommended-card img {
        height: 105px;
      }

      .food-card-image { height: 145px; }

      .ai-search-wrap {
        min-height: 48px;
        padding: 0 8px 0 12px;
        gap: 6px;
      }

      .ai-badge {
        padding: 6px 8px;
        font-size: 10px;
        max-width: 86px;
      }

      .ai-badge span {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .category-pill {
        font-size: 11px;
        padding: 8px 11px;
      }
    }

    /* Skeleton loading */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 12px;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-text {
      height: 16px;
      margin-bottom: 8px;
    }

    .skeleton-title {
      height: 24px;
      width: 60%;
      margin-bottom: 12px;
    }

    /* Lazy load blur effect */
    .blur-load {
      background-size: cover;
      background-position: center;
    }

    .blur-load.loaded > img {
      opacity: 1;
    }

    .blur-load > img {
      opacity: 0;
      transition: opacity 200ms ease-in-out;
    }
  </style>
</head>
<body>
  <!-- Loading State -->
  <div id="loading-screen" class="fixed inset-0 bg-[#f8f8f5] z-[200] flex items-center justify-center transition-opacity duration-300">
    <div class="text-center">
      <div class="w-16 h-16 border-4 border-[#0f766e] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-gray-600 font-medium">Yüklənir...</p>
    </div>
  </div>

  <header class="sticky top-0 z-40 glass border-b border-gray-100" style="height: var(--header-h);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
      <div class="flex items-center gap-3 min-w-0">
        <div id="header-logo" class="w-11 h-11 rounded-2xl bg-gray-100 flex items-center justify-center overflow-hidden flex-shrink-0">
          <i class="fas fa-utensils text-gray-400"></i>
        </div>
        <div class="min-w-0">
          <h1 id="restaurant-name" class="font-extrabold text-base sm:text-lg text-gray-900 truncate">Yüklənir...</h1>
          <p id="restaurant-subtitle" class="text-[11px] sm:text-xs text-gray-500 truncate">QR Menyu</p>
        </div>
      </div>
      <button onclick="toggleLanguage()" class="h-10 sm:h-11 px-3 sm:px-4 border border-gray-200 rounded-2xl bg-white shadow-premium flex items-center gap-2 font-bold text-xs sm:text-sm">
        <span id="current-lang">AZ</span>
        <i class="fas fa-chevron-down text-[10px] sm:text-xs text-gray-400"></i>
      </button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 sm:py-6">
    <section id="hero-section" class="mb-5 sm:mb-6">
      <div class="hero shadow-premium skeleton" style="min-height: 265px;">
        <div class="hero-overlay"></div>
        <div class="hero-copy">
          <div class="skeleton skeleton-title bg-white/20"></div>
          <div class="skeleton skeleton-text w-1/2 bg-white/20"></div>
        </div>
      </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 lg:gap-6">
      <aside class="hidden lg:block lg:col-span-3">
        <div class="sticky top-24 space-y-4">
          <div class="bg-[#f8f2dc] border border-[#edd68b] rounded-[26px] p-5 shadow-premium">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-[#f2e6b0] rounded-[18px] flex items-center justify-center text-[#d97706] text-xl">
                <i class="fas fa-location-dot"></i>
              </div>
              <div>
                <p class="font-bold text-[16px] leading-tight" data-az="Buradasınız" data-en="You are here">Buradasınız</p>
                <p class="text-sm text-gray-500" id="table-indicator-text">QR Menu</p>
              </div>
            </div>
          </div>

          <div class="sidebar-link" onclick="filterPopular()">
            <i class="fas fa-star text-amber-500 text-base"></i>
            <span data-az="Populyar" data-en="Popular">Populyar</span>
          </div>

          <div class="sidebar-link" onclick="showFavoritesOnly()">
            <i class="fas fa-heart text-red-500 text-base"></i>
            <span data-az="Seçilənlər" data-en="Favorites">Seçilənlər</span>
          </div>

          <p class="text-[11px] text-gray-400 uppercase tracking-wider font-extrabold px-4 pt-2" data-az="Kateqoriyalar" data-en="Categories">Kateqoriyalar</p>
          <nav id="categories-list" class="space-y-2 custom-scroll max-h-[60vh] overflow-y-auto">
            <div class="sidebar-link skeleton h-12"></div>
            <div class="sidebar-link skeleton h-12"></div>
            <div class="sidebar-link skeleton h-12"></div>
          </nav>
        </div>
      </aside>

      <main class="lg:col-span-6 space-y-5 sm:space-y-6">
        <div class="hide-desktop overflow-x-auto custom-scroll">
          <div id="mobile-category-slider" class="flex gap-2 min-w-max">
            <div class="category-pill skeleton w-24 h-10"></div>
            <div class="category-pill skeleton w-28 h-10"></div>
            <div class="category-pill skeleton w-20 h-10"></div>
          </div>
        </div>

        <section id="recommended-section" class="bg-white rounded-[24px] sm:rounded-[28px] border border-gray-200 p-4 sm:p-5 shadow-premium">
          <div class="flex items-center justify-between mb-4 gap-3">
            <div class="skeleton h-8 w-48"></div>
            <div class="flex gap-2">
              <div class="skeleton w-10 h-10 rounded-full"></div>
              <div class="skeleton w-10 h-10 rounded-full"></div>
            </div>
          </div>
          <div class="flex gap-4">
            <div class="skeleton w-40 h-32 rounded-2xl"></div>
            <div class="skeleton w-40 h-32 rounded-2xl"></div>
          </div>
        </section>

        <section class="bg-white rounded-[24px] sm:rounded-[28px] border border-gray-200 p-4 sm:p-6 shadow-premium">
          <div class="mb-4 sm:mb-5">
            <div class="skeleton h-8 w-32 mb-2"></div>
            <div class="skeleton h-4 w-24"></div>
          </div>
          <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
            <div class="food-card skeleton h-64"></div>
            <div class="food-card skeleton h-64"></div>
            <div class="food-card skeleton h-64"></div>
            <div class="food-card skeleton h-64"></div>
          </div>
        </section>

        <footer class="text-center text-xs sm:text-sm text-gray-500 pb-6 pt-1 px-2">
          Korporativ Mədəniyyət və İşçilərin İnkişafı Komandası tərəfindən hazırlanıb.
        </footer>
      </main>

      <aside class="hidden lg:block lg:col-span-3">
        <div class="sticky top-24 space-y-4">
          <div class="ai-search-wrap">
            <i class="fas fa-magnifying-glass text-gray-400 text-base"></i>
            <input id="search-input" oninput="debouncedSearch(this.value)" placeholder="Ağıllı axtarış..." class="flex-1 min-w-0 outline-none bg-transparent text-sm" />
            <button type="button" class="ai-badge" onclick="focusSearch()" aria-label="Ağıllı axtarış">
              <i class="fas fa-wand-magic-sparkles text-emerald-400 text-[10px]"></i>
              <span id="smart-search-label">Ağıllı Axtarış</span>
            </button>
          </div>

          <div class="bg-white rounded-[28px] border border-gray-200 p-5 sm:p-6 shadow-premium">
            <h3 class="font-extrabold text-[17px] sm:text-[18px] mb-5" data-az="Məkan məlumatı" data-en="Venue information">Məkan məlumatı</h3>
            <div class="space-y-5">
              <div class="flex items-start gap-4">
                <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-[18px] bg-gray-100 flex items-center justify-center text-base sm:text-lg text-gray-600"><i class="far fa-clock"></i></div>
                <div>
                  <p class="text-gray-400 text-xs sm:text-sm" data-az="İş saatları" data-en="Working hours">İş saatları</p>
                  <p id="working-hours" class="font-semibold text-[15px] sm:text-[17px]">07:00 - 24:00</p>
                </div>
              </div>

              <div class="flex items-start gap-4">
                <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-[18px] bg-gray-100 flex items-center justify-center text-base sm:text-lg text-gray-600"><i class="fas fa-location-dot"></i></div>
                <div>
                  <p class="text-gray-400 text-xs sm:text-sm" data-az="Ünvan" data-en="Address">Ünvan</p>
                  <p id="venue-address" class="font-semibold text-[14px] sm:text-[15px] leading-snug">Address not set</p>
                </div>
              </div>

              <div class="flex items-start gap-4">
                <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-[18px] bg-gray-100 flex items-center justify-center text-base sm:text-lg text-gray-600"><i class="fas fa-phone"></i></div>
                <div>
                  <p class="text-gray-400 text-xs sm:text-sm" data-az="Telefon" data-en="Phone">Telefon</p>
                  <p id="venue-phone" class="font-semibold text-[14px] sm:text-[15px] leading-snug">-</p>
                </div>
              </div>
            </div>
          </div>

          <div id="social-links" class="flex gap-3"></div>
        </div>
      </aside>
    </div>
  </div>

  <div class="mobile-bottom-bar">
    <button onclick="showMobileCategories()" class="flex flex-col items-center gap-1 text-gray-600">
      <i class="fas fa-list text-lg"></i>
      <span class="text-[11px] font-semibold" data-az="Kateqoriya" data-en="Categories">Kateqoriya</span>
    </button>
    <button onclick="showMobileSearch()" class="flex flex-col items-center gap-1 text-gray-600">
      <i class="fas fa-wand-magic-sparkles text-lg"></i>
      <span class="text-[11px] font-semibold" data-az="Axtarış" data-en="Search">Axtarış</span>
    </button>
    <button onclick="showFavoritesOnly()" class="flex flex-col items-center gap-1 text-gray-600">
      <i class="fas fa-heart text-lg"></i>
      <span class="text-[11px] font-semibold" data-az="Seçilənlər" data-en="Favorites">Seçilənlər</span>
    </button>
  </div>

  <div id="mobile-categories-modal" class="fixed inset-0 bg-black/50 z-50 hidden" onclick="closeMobileModal(event, 'mobile-categories-modal')">
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[28px] p-6 max-h-[80vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-extrabold text-lg sm:text-xl" data-az="Kateqoriyalar" data-en="Categories">Kateqoriyalar</h3>
        <button onclick="closeMobileModal(null, 'mobile-categories-modal')" class="w-10 h-10 rounded-full bg-gray-100"><i class="fas fa-times"></i></button>
      </div>
      <div id="mobile-categories-list" class="space-y-2"></div>
    </div>
  </div>

  <div id="mobile-search-modal" class="fixed inset-0 bg-black/50 z-50 hidden" onclick="closeMobileModal(event, 'mobile-search-modal')">
    <div class="absolute top-20 left-4 right-4 bg-white rounded-[24px] p-4 shadow-premium" onclick="event.stopPropagation()">
      <div class="ai-search-wrap">
        <i class="fas fa-magnifying-glass text-gray-400 text-base"></i>
        <input id="mobile-search-input" oninput="debouncedSearch(this.value)" placeholder="Ağıllı axtarış..." class="flex-1 min-w-0 outline-none bg-transparent text-sm" />
        <button type="button" class="ai-badge" onclick="focusMobileSearch()">
          <i class="fas fa-wand-magic-sparkles text-emerald-400 text-[10px]"></i>
          <span>Ağıllı</span>
        </button>
      </div>
    </div>
  </div>

  <div id="detail-modal" class="detail-modal" onclick="closeDetailModal(event)">
    <div id="detail-card" class="detail-card" onclick="event.stopPropagation()"></div>
  </div>

  <script>
    const CONFIG = {
      GAS_URL: 'https://script.google.com/macros/s/AKfycbxvkYs_MLWIH3WYYymL_wWjAGN7VmosXIcJ2pnPE6xr3HF55kLgmq9Wz3DhQzO9ygXUcA/exec',
      CACHE_KEY: 'menu_cache_v2',
      CACHE_TIME: 5 * 60 * 1000, // 5 dəqiqə
      RECOMMENDED_SLIDE_INTERVAL: 3200,
      REFRESH_INTERVAL: 30 * 1000 // 30 saniyədə bir yenilə
    };

    let currentLang = 'az';
    let categories = [];
    let products = [];
    let settings = {};
    let favorites = JSON.parse(localStorage.getItem('menu_favorites') || '[]');
    let lastFetch = 0;
    let isLoading = false;

    let currentCategory = null;
    let currentFilterMode = 'category';
    let searchQuery = '';
    let currentRecommendedIndex = 0;
    let recommendedTimer = null;
    let cardObserver = null;
    let scrollObserver = null;
    let refreshTimer = null;
    let searchDebounceTimer = null;

    // Fallback data - dərhal göstərmək üçün
    const fallbackData = {
      categories: [

    function safeText(v) { return v == null ? '' : String(v); }

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeText(str) {
      const map = { 'ə':'e','Ə':'e','ı':'i','I':'i','İ':'i','ö':'o','Ö':'o','ğ':'g','Ğ':'g','ü':'u','Ü':'u','ş':'s','Ş':'s','ç':'c','Ç':'c' };
      return safeText(str)
        .split('')
        .map(ch => map[ch] || ch)
        .join('')
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\s]/gu, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function tokenize(str) { return normalizeText(str).split(' ').filter(Boolean); }

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      if (!m) return n;
      if (!n) return m;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
        }
      }
      return dp[m][n];
    }

    function fuzzySimilarity(a, b) {
      if (!a || !b) return 0;
      if (a === b) return 1;
      if (a.includes(b) || b.includes(a)) return .9;
      const dist = levenshtein(a, b);
      return Math.max(0, 1 - dist / Math.max(a.length, b.length));
    }

    function getLocalized(fieldAz, fieldEn) {
      return currentLang === 'az' ? (fieldAz || fieldEn || '') : (fieldEn || fieldAz || '');
    }

    function getCategoryById(id) {
      return categories.find(c => Number(c.id) === Number(id));
    }

    function getLocalizedCategoryName(cat) {
      return cat ? getLocalized(cat.nameAz, cat.nameEn) : '';
    }

    function getLocalizedProductName(product) {
      return getLocalized(product.nameAz, product.nameEn);
    }

    function getLocalizedProductDesc(product) {
      return getLocalized(product.descAz, product.descEn);
    }

    function buildSearchCorpus(product) {
      const category = getCategoryById(product.categoryId);
      return [
        product.nameAz, product.nameEn,
        product.descAz, product.descEn,
        product.ingredientsAz, product.ingredientsEn,
        category?.nameAz, category?.nameEn,
        product.categoryName
      ].map(safeText).join(' ');
    }

    function scoreProduct(product, query) {
      const q = normalizeText(query);
      if (!q) return 0;
      const qTokens = tokenize(q);
      const corpus = buildSearchCorpus(product);
      const corpusTokens = tokenize(corpus);
      const nameAz = normalizeText(product.nameAz);
      const nameEn = normalizeText(product.nameEn);
      const descAz = normalizeText(product.descAz);
      const descEn = normalizeText(product.descEn);
      let score = 0;

      [nameAz, nameEn, descAz, descEn, normalizeText(corpus)].forEach(field => {
        if (!field) return;
        if (field === q) score += 120;
        if (field.startsWith(q)) score += 60;
        if (field.includes(q)) score += 40;
      });

      qTokens.forEach(qt => {
        corpusTokens.forEach(tok => {
          const sim = fuzzySimilarity(qt, tok);
          if (sim >= .98) score += 22;
          else if (sim >= .88) score += 12;
          else if (sim >= .78) score += 6;
        });

        [nameAz, nameEn].forEach(field => {
          tokenize(field).forEach(tok => {
            const sim = fuzzySimilarity(qt, tok);
            if (sim >= .98) score += 30;
            else if (sim >= .88) score += 18;
            else if (sim >= .78) score += 8;
          });
        });
      });

      if (product.popular) score += 4;
      if (product.recommended) score += 5;
      return score;
    }

    function getSearchResults(query) {
      return products
        .filter(p => p.available !== false)
        .map(product => ({ product, score: scoreProduct(product, query) }))
        .filter(item => item.score > 12)
        .sort((a, b) => b.score - a.score)
        .map(item => item.product);
    }

    function highlightMatch(text, query) {
      if (!query || !text) return escapeHtml(text);
      const escaped = escapeHtml(text);
      const q = safeText(query).trim();
      if (!q) return escaped;
      try {
        const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'ig');
        return escaped.replace(regex, '<span class="bg-yellow-200 rounded px-1">$1</span>');
      } catch {
        return escaped;
      }
    }

    // Cache functions
    function getCachedData() {
      try {
        const cached = localStorage.getItem(CONFIG.CACHE_KEY);
        if (!cached) return null;
        const { data, timestamp } = JSON.parse(cached);
        if (Date.now() - timestamp > CONFIG.CACHE_TIME) return null;
        return data;
      } catch {
        return null;
      }
    }

    function setCachedData(data) {
      try {
        localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({
          data,
          timestamp: Date.now()
        }));
      } catch (e) {
        console.error('Cache error:', e);
      }
    }

    async function loadData(forceRefresh = false) {
      if (isLoading) return;
      isLoading = true;

      // İlk olaraq cache'dən göstər
      if (!forceRefresh) {
        const cached = getCachedData();
        if (cached) {
          categories = cached.categories || [];
          products = cached.products || [];
          settings = cached.settings || {};
          const active = categories.filter(c => c.active !== false).sort((a,b)=>(+a.sortOrder||0)-(+b.sortOrder||0));
          if (active.length && !currentCategory) currentCategory = Number(active[0].id);
          renderAll();
          hideLoading();
        }
      }

      // Sonra serverdən yenilə
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 saniyə timeout
        
        const res = await fetch(CONFIG.GAS_URL + '?action=getMenu&t=' + Date.now(), {
          signal: controller.signal,
          cache: 'no-store'
        });
        
        clearTimeout(timeoutId);
        
        const data = await res.json();
        
        if (data.categories?.length || data.products?.length) {
          categories = Array.isArray(data.categories) ? data.categories : [];
          products = Array.isArray(data.products) ? data.products : [];
          settings = data.settings || {};
          
          setCachedData({ categories, products, settings });
          
          const active = categories.filter(c => c.active !== false).sort((a,b)=>(+a.sortOrder||0)-(+b.sortOrder||0));
          if (active.length && !currentCategory) currentCategory = Number(active[0].id);
          
          // Yalnız dəyişiklik varsa render et
          if (forceRefresh || JSON.stringify(data) !== JSON.stringify(getCachedData())) {
            renderAll();
          }
        }
      } catch (e) {
        console.error('Fetch error:', e);
        // Cache yoxdursa fallback göstər
        if (!categories.length) {
          categories = fallbackData.categories;
          products = fallbackData.products;
          settings = fallbackData.settings;
          const active = categories.filter(c => c.active !== false).sort((a,b)=>(+a.sortOrder||0)-(+b.sortOrder||0));
          if (active.length) currentCategory = Number(active[0].id);
          renderAll();
        }
      } finally {
        isLoading = false;
        hideLoading();
      }
    }

    function slideRecommended(direction) {
      const track = document.getElementById('recommended-track');
      if (!track) return;
      const cards = track.querySelectorAll('.recommended-card');
      if (!cards.length) return;
      currentRecommendedIndex += direction;
      if (currentRecommendedIndex < 0) currentRecommendedIndex = cards.length - 1;
      if (currentRecommendedIndex >= cards.length) currentRecommendedIndex = 0;
      track.scrollTo({ left: cards[currentRecommendedIndex].offsetLeft - track.offsetLeft, behavior: 'smooth' });
      restartRecommendedAutoplay();
    }

    function startRecommendedAutoplay() {
      clearInterval(recommendedTimer);
      recommendedTimer = setInterval(() => {
        const track = document.getElementById('recommended-track');
        if (!track) return;
        const cards = track.querySelectorAll('.recommended-card');
        if (cards.length < 2) return;
        currentRecommendedIndex = (currentRecommendedIndex + 1) % cards.length;
        track.scrollTo({ left: cards[currentRecommendedIndex].offsetLeft - track.offsetLeft, behavior: 'smooth' });
      }, CONFIG.RECOMMENDED_SLIDE_INTERVAL);
    }

    function initCardObserver() {
      if (cardObserver) cardObserver.disconnect();

      cardObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('in-view');
        });
      }, { threshold: .12 });

      document.querySelectorAll('.food-card').forEach(card => cardObserver.observe(card));
    }

    // Yuxarı və aşağı scroll edəndə kateqoriya dəyişmə
    function initScrollObserver() {
      if (scrollObserver) scrollObserver.disconnect();

      const options = {
        root: null,
        rootMargin: '-20% 0px -70% 0px',
        threshold: 0
      };

      scrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const categoryId = entry.target.dataset.categoryId;
            if (categoryId && currentFilterMode === 'category') {
              const newCategory = Number(categoryId);
              if (newCategory !== currentCategory) {
                currentCategory = newCategory;
                updateActiveCategoryUI();
              }
            }
          }
        });
      }, options);

      // Hər kateqoriyanın ilk məhsulunu izlə
      const active = categories.filter(c => c.active !== false).sort((a,b)=>(+a.sortOrder||0)-(+b.sortOrder||0));
      active.forEach(cat => {
        const firstProduct = document.querySelector(`[data-category-id="${cat.id}"]`);
        if (firstProduct) {
          scrollObserver.observe(firstProduct);
        }
      });
    }

    function updateActiveCategoryUI() {
      // Desktop sidebar
      document.querySelectorAll('#categories-list .sidebar-link').forEach(link => {
        link.classList.remove('active');
        if (Number(link.dataset.categoryId) === currentCategory) {
          link.classList.add('active');
        }

      // Mobile slider
      document.querySelectorAll('#mobile-category-slider .category-pill').forEach(pill => {
        pill.classList.remove('active');
        if (Number(pill.dataset.categoryId) === currentCategory) {
          pill.classList.add('active');
        }
      });

      updateSectionHeader();
    }

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-5 mt-5 sm:mt-6">
            <div class="rounded-[22px] border border-gray-200 p-4 sm:p-5 bg-gray-50">
              <div class="font-extrabold text-[15px] sm:text-[16px] mb-2">${currentLang === 'az' ? 'Tərkibi' : 'Ingredients'}</div>
              <p class="text-sm sm:text-base text-gray-600 leading-6 sm:leading-7">${escapeHtml(getLocalized(product.ingredientsAz, product.ingredientsEn) || getLocalizedProductDesc(product) || '-')}</p>
            </div>
            <div class="rounded-[22px] border border-gray-200 p-4 sm:p-5 bg-gray-50">
              <div class="font-extrabold text-[15px] sm:text-[16px] mb-2">${currentLang === 'az' ? 'Allergenlər' : 'Allergens'}</div>
              <p class="text-sm sm:text-base text-gray-600 leading-6 sm:leading-7">${escapeHtml(getLocalized(product.allergensAz, product.allergensEn) || '-')}</p>
            </div>
          </div>
        </div>
      `;

      document.getElementById('detail-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeDetailModal(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('detail-modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    function toggleFavorite(productId, button) {
      const index = favorites.indexOf(productId);
      if (index > -1) favorites.splice(index, 1);
      else favorites.push(productId);

      localStorage.setItem('menu_favorites', JSON.stringify(favorites));

      if (currentFilterMode === 'favorites') {
        renderProducts();
      } else {
        button.innerHTML = `<i class="${favorites.includes(productId) ? 'fas' : 'far'} fa-heart text-sm"></i>`;
        button.className = `w-9 h-9 sm:w-10 sm:h-10 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 flex items-center justify-center ${favorites.includes(productId) ? 'text-red-500' : 'text-gray-500'}`;
      }
    }

    function renderInfo() {
      document.getElementById('working-hours').textContent = settings.workWeekday || '07:00 - 24:00';
      document.getElementById('venue-address').textContent = getLocalized(settings.addressAz, settings.addressEn) || 'Address not set';
      document.getElementById('venue-phone').textContent = settings.phone || '-';
      const table = new URLSearchParams(window.location.search).get('table');
      document.getElementById('table-indicator-text').textContent = table ? `Table ${table}` : 'QR Menu';
    }

    function renderSocials() {
      const container = document.getElementById('social-links');
      let html = '';

      if (settings.whatsapp) {
        const num = safeText(settings.whatsapp).replace(/[^\d]/g, '');
        html += `<a href="https://wa.me/${num}" target="_blank" class="w-12 h-12 sm:w-14 sm:h-14 rounded-[18px] border border-gray-200 bg-white flex items-center justify-center shadow-premium text-lg sm:text-xl"><i class="fab fa-whatsapp"></i></a>`;
      }

      if (settings.instagram) {
        html += `<a href="${settings.instagram}" target="_blank" class="w-12 h-12 sm:w-14 sm:h-14 rounded-[18px] border border-gray-200 bg-white flex items-center justify-center shadow-premium text-lg sm:text-xl"><i class="fab fa-instagram"></i></a>`;
      }

      if (settings.facebook) {
        html += `<a href="${settings.facebook}" target="_blank" class="w-12 h-12 sm:w-14 sm:h-14 rounded-[18px] border border-gray-200 bg-white flex items-center justify-center shadow-premium text-lg sm:text-xl"><i class="fab fa-facebook-f"></i></a>`;
      }

      container.innerHTML = html;
    }

    function renderTextLabels() {
      document.querySelectorAll('[data-az][data-en]').forEach(el => {
        el.textContent = el.getAttribute(`data-${currentLang}`);
      });

      document.getElementById('search-input').placeholder = currentLang === 'az' ? 'Ağıllı axtarış...' : 'Smart search...';
      const mobileSearch = document.getElementById('mobile-search-input');
      if (mobileSearch) mobileSearch.placeholder = currentLang === 'az' ? 'Ağıllı axtarış...' : 'Smart search...';

      document.getElementById('smart-search-label').textContent = currentLang === 'az' ? 'Ağıllı Axtarış' : 'Smart Search';
    }

    function syncSearchInputs() {
      const desktop = document.getElementById('search-input');
      const mobile = document.getElementById('mobile-search-input');
      if (desktop) desktop.value = searchQuery;
      if (mobile) mobile.value = searchQuery;
    }

    function debouncedSearch(value) {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        smartSearch(value);
      }, 150);
    }

    function selectCategory(categoryId, autoScroll = false) {
      currentCategory = Number(categoryId);
      currentFilterMode = 'category';
      searchQuery = '';
      syncSearchInputs();
      renderCategoryLists();
      renderProducts();

      if (!autoScroll) {
        const section = document.getElementById('products-grid');
        if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function filterPopular() {
      currentFilterMode = 'popular';
      searchQuery = '';
      syncSearchInputs();
      renderCategoryLists();
      renderProducts();
    }

    function showFavoritesOnly() {
      currentFilterMode = 'favorites';
      searchQuery = '';
      syncSearchInputs();
      renderCategoryLists();
      renderProducts();
    }

    function smartSearch(value) {
      searchQuery = safeText(value).trim();
      syncSearchInputs();
      currentFilterMode = searchQuery ? 'search' : 'category';
      renderCategoryLists();
      renderProducts();
    }

    function focusSearch() {
      const input = document.getElementById('search-input');
      if (!input) return;
      input.focus();
      input.select();
    }

    function focusMobileSearch() {
      const input = document.getElementById('mobile-search-input');
      if (!input) return;
      input.focus();
      input.select();
    }

    function toggleLanguage() {
      currentLang = currentLang === 'az' ? 'en' : 'az';
      renderAll();
    }

    function showMobileCategories() {
      document.getElementById('mobile-categories-modal').classList.remove('hidden');
    }

    function showMobileSearch() {
      document.getElementById('mobile-search-modal').classList.remove('hidden');
      setTimeout(() => {
        const input = document.getElementById('mobile-search-input');
        if (input) input.focus();
      }, 80);
    }

    function closeMobileModal(event, id) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById(id).classList.add('hidden');
    }

    // Auto refresh every 30 seconds
    function startAutoRefresh() {
      refreshTimer = setInterval(() => {
        loadData(true);
      }, CONFIG.REFRESH_INTERVAL);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeDetailModal();
        closeMobileModal(null, 'mobile-categories-modal');
        closeMobileModal(null, 'mobile-search-modal');
      }
    });

    // Visibility change - tab açıldıqda dərhal yenilə
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        loadData(true);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      startAutoRefresh();
    });

    // Page unload - timerları təmizlə
    window.addEventListener('beforeunload', () => {
      clearInterval(refreshTimer);
      clearInterval(recommendedTimer);
      clearTimeout(searchDebounceTimer);
    });
  </script>
</body>
</html>
