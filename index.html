<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Menyu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #ffffff; }
        
        /* Hero Slider */
        .hero-slider {
            position: relative;
            height: 200px;
            overflow: hidden;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        .hero-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f5f0 0%, #e8e8e0 100%);
        }
        .hero-slide.active { opacity: 1; }
        .hero-content {
            text-align: center;
            padding: 20px;
        }
        .hero-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .hero-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s;
        }
        .hero-dot.active { background: #059669; width: 24px; border-radius: 4px; }
        
        /* Sidebar */
        .sidebar-item { 
            transition: all 0.2s; 
            cursor: pointer;
            padding: 10px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-item:hover { background: #f3f4f6; color: #059669; }
        .sidebar-item.active { 
            background: #ecfdf5; 
            color: #059669; 
            font-weight: 600;
        }
        .sidebar-item.active::before { 
            content: ''; 
            width: 4px; 
            height: 20px; 
            background: #059669; 
            border-radius: 2px;
            margin-left: -16px;
            margin-right: 12px;
        }
        
        /* Product Card */
        .product-card { 
            border-bottom: 1px dashed #e5e7eb;
            padding: 20px 0;
        }
        .product-card:last-child { border-bottom: none; }
        
        /* Image Gallery */
        .image-gallery {
            position: relative;
            width: 100px;
            height: 140px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .gallery-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            transition: all 0.4s ease;
            background: #f9fafb;
        }
        .gallery-image.active { opacity: 1; transform: scale(1); }
        .gallery-image.inactive { opacity: 0; transform: scale(0.9); }
        .gallery-nav {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
        }
        .gallery-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .gallery-dot.active { background: #059669; }
        
        /* Search */
        .search-highlight {
            background: #fef3c7;
            padding: 0 2px;
            border-radius: 2px;
        }
        .search-box:focus-within { 
            border-color: #059669; 
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }
        
        /* Price */
        .price-tag { 
            color: #b45309; 
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        /* Favorite */
        .favorite-btn { 
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e5e7eb;
            background: white;
        }
        .favorite-btn:hover { border-color: #ef4444; color: #ef4444; }
        .favorite-btn.active { 
            background: #ef4444; 
            color: white; 
            border-color: #ef4444;
        }
        
        /* Info Cards */
        .info-icon { 
            width: 44px; 
            height: 44px; 
            background: #f3f4f6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #374151;
            font-size: 1.1rem;
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.5s ease-out; }
        
        /* Mobile */
        .mobile-bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e5e7eb;
            padding: 12px 24px;
            display: flex;
            justify-content: space-around;
            z-index: 50;
            padding-bottom: env(safe-area-inset-bottom, 12px);
        }
        @media (min-width: 1024px) {
            .mobile-bottom-bar { display: none; }
        }
        
        /* Modal */
        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .image-modal.active { display: flex; }
        .modal-gallery {
            position: relative;
            width: 90%;
            max-width: 600px;
            height: 70vh;
        }
        .modal-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .modal-image.active { opacity: 1; }
        
        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    </style>
</head>

<script>
// ============================================
// CONFIGURATION
// ============================================
const CONFIG = {
    GAS_URL: 'https://script.google.com/macros/s/AKfycbzvLFtVxLHAetj7_RSzZWA2aNXfmm_LYIJ8c4uvX7W9t3vljY8U9Hjbo6L2arc4HMcxXQ/exec',
    SLIDER_INTERVAL: 4000, // 4 seconds
    USE_LOCAL_STORAGE: true
};

// ============================================
// STATE
// ============================================
let currentLang = 'en';
let categories = [];
let products = [];
let settings = {};
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
let currentCategory = null;
let searchQuery = '';
let heroSliderInterval = null;
let currentHeroSlide = 0;
let modalImages = [];
let currentModalImage = 0;

// ============================================
// TRANSLATIONS
// ============================================
const translations = {
    az: {
        search: 'Axtar...',
        searchPlaceholder: 'Məhsul axtar...',
        noProducts: 'Məhsul tapılmadı',
        popular: 'Populyar',
        here: 'Burada',
        workingHours: '07:00 - 00:00',
        menu: 'Menyu',
        categories: 'Kateqoriyalar',
        info: 'Məlumat'
    },
    en: {
        search: 'Search...',
        searchPlaceholder: 'Search products...',
        noProducts: 'No products found',
        popular: 'Popular',
        here: 'Here',
        workingHours: 'From 07:00 to 00:00',
        menu: 'Menu',
        categories: 'Categories',
        info: 'Info'
    }
};

// ============================================
// INITIALIZATION
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    loadData();
    startHeroSlider();
});

// ============================================
// DATA LOADING
// ============================================
async function loadData() {
    // Try API first
    if (CONFIG.GAS_URL && !CONFIG.GAS_URL.includes('YOUR_SCRIPT_ID')) {
        try {
            const response = await fetch(CONFIG.GAS_URL + '?action=getMenu');
            const data = await response.json();
            categories = data.categories || [];
            products = data.products || [];
            settings = data.settings || {};
        } catch (error) {
            console.log('API failed, using localStorage');
            loadFromLocalStorage();
        }
    } else {
        loadFromLocalStorage();
    }
    
    if (categories.length === 0) loadDemoData();
    
    renderCategories();
    renderHeroSlider();
    renderProducts();
    updateSettings();
}

function loadFromLocalStorage() {
    categories = JSON.parse(localStorage.getItem('categories') || '[]');
    products = JSON.parse(localStorage.getItem('products') || '[]');
    settings = JSON.parse(localStorage.getItem('settings') || '{}');
}

        { id: 2, nameAz: 'Salatlar', nameEn: 'Salads', icon: '🥗', active: true },
        { id: 3, nameAz: 'Əsas yeməklər', nameEn: 'Main courses', icon: '🍽️', active: true }
    ];
    
    products = [
        {
            id: 1,
            categoryId: 1,
            nameAz: 'Evian still water',

                'https://www.perrier.com/us/en/imgs/product/perrier-original-750ml.png',
                'https://www.perrier.com/us/en/imgs/product/perrier-glass.jpg'
            ],
            specs: { volume: '0.75ml', time: '3min' }
        },
        {
            id: 3,
            categoryId: 2,
            nameAz: 'Çoban salatı',
            nameEn: 'Shepherd salad',
            descAz: 'Təzə tərəvəzlərlə',
            descEn: 'With fresh vegetables',
            price: 12,
            popular: true,
            images: [
                'https://via.placeholder.com/300x400?text=Salad+1',

            ],

// ============================================
// HERO SLIDER
// ============================================
function renderHeroSlider() {
    const slider = document.getElementById('hero-slider');
    const dots = document.getElementById('hero-dots');
    
    // Get random products for slider
    const sliderProducts = products
        .filter(p => p.available !== false && p.images && p.images.length > 0)
        .slice(0, 5);
    
    if (sliderProducts.length === 0) {
        slider.style.display = 'none';
        return;
    }
    
    let slidesHtml = '';
    let dotsHtml = '';
    
    sliderProducts.forEach((product, index) => {
        const name = currentLang === 'az' ? product.nameAz : product.nameEn;
        slidesHtml += `
            <div class="hero-slide ${index === 0 ? 'active' : ''}" data-index="${index}">
                <div class="hero-content">
                    <img src="${product.images[0]}" class="h-32 object-contain mb-3 mx-auto drop-shadow-lg">
                    <h3 class="font-bold text-lg text-gray-800">${name}</h3>
                    <p class="text-amber-600 font-semibold">${product.price} AZN</p>
                </div>
            </div>
        `;
        dotsHtml += `<div class="hero-dot ${index === 0 ? 'active' : ''}" onclick="goToHeroSlide(${index})"></div>`;
    });
    
    slider.innerHTML = slidesHtml + dots.outerHTML;
    document.getElementById('hero-dots').innerHTML = dotsHtml;
}

function startHeroSlider() {
    heroSliderInterval = setInterval(() => {
        const slides = document.querySelectorAll('.hero-slide');
        const dots = document.querySelectorAll('.hero-dot');
        
        if (slides.length === 0) return;
        
        slides[currentHeroSlide].classList.remove('active');
        dots[currentHeroSlide].classList.remove('active');
        
        currentHeroSlide = (currentHeroSlide + 1) % slides.length;
        
        slides[currentHeroSlide].classList.add('active');
        dots[currentHeroSlide].classList.add('active');
    }, CONFIG.SLIDER_INTERVAL);
}

function goToHeroSlide(index) {
    const slides = document.querySelectorAll('.hero-slide');
    const dots = document.querySelectorAll('.hero-dot');
    
    slides[currentHeroSlide].classList.remove('active');
    dots[currentHeroSlide].classList.remove('active');
    
    currentHeroSlide = index;
    
    slides[currentHeroSlide].classList.add('active');
    dots[currentHeroSlide].classList.add('active');
    
    // Reset interval
    clearInterval(heroSliderInterval);
    startHeroSlider();
}

// ============================================
// SMART SEARCH (FUZZY)
// ============================================
function smartSearch(query) {
    searchQuery = query.toLowerCase().trim();
    
    if (searchQuery === '') {
        currentCategory = null;
        renderProducts();
        updateCategoryHeaders();
        return;
    }
    
    // Show all products matching search
    currentCategory = 'search';
    renderProducts();
}

function calculateSimilarity(str1, str2) {
    // Simple fuzzy match - check if all chars in query exist in product name in order
    str1 = str1.toLowerCase();
    str2 = str2.toLowerCase();
    
    let index = 0;
    for (let char of str2) {
        if (index < str1.length && str1[index] === char) {
            index++;
        }
    }
    return index / str1.length;
}

function highlightMatch(text, query) {
    if (!query) return text;
    
    const regex = new RegExp(`(${query})`, 'gi');
    return text.replace(regex, '<span class="search-highlight">$1</span>');
}

// ============================================
// RENDER FUNCTIONS
// ============================================
function renderCategories() {
    const container = document.getElementById('categories-list');
    const mobileContainer = document.getElementById('mobile-categories-list');
    
    const activeCategories = categories.filter(c => c.active !== false);
    
    const html = activeCategories.map(cat => `
        <div class="sidebar-item ${currentCategory === cat.id ? 'active' : ''}" 
             onclick="selectCategory(${cat.id})">
            <span class="text-xl">${cat.icon || '🍽️'}</span>
            <span>${currentLang === 'az' ? cat.nameAz : cat.nameEn}</span>
        </div>
    `).join('');
    
    container.innerHTML = html;
    mobileContainer.innerHTML = html;
    
    if (!currentCategory && activeCategories.length > 0) {
        selectCategory(activeCategories[0].id);
    }
}

function selectCategory(categoryId) {
    currentCategory = categoryId;
    searchQuery = '';
    document.getElementById('search-input').value = '';
    
    const category = categories.find(c => c.id === categoryId);
    if (category) {
        document.getElementById('current-category').textContent = currentLang === 'az' ? category.nameAz : category.nameEn;
        document.getElementById('current-subcategory').textContent = currentLang === 'az' ? 'Bütün məhsullar' : 'All products';
    }
    
    renderCategories();
    renderProducts();
    closeMobileModal(null, 'mobile-categories-modal');
}

function filterPopular() {
    currentCategory = 'popular';
    searchQuery = '';
    document.getElementById('current-category').textContent = currentLang === 'az' ? 'Populyar məhsullar' : 'Popular products';
    document.getElementById('current-subcategory').textContent = '';
    renderCategories();
    renderProducts();
}

function renderProducts() {
    const container = document.getElementById('products-list');
    
    let filtered = products.filter(p => p.available !== false);
    
    // Apply filters
    if (currentCategory === 'popular') {
        filtered = filtered.filter(p => p.popular);
    } else if (currentCategory === 'search') {
        // Fuzzy search on both languages
        filtered = filtered.filter(p => {
            const nameAz = p.nameAz.toLowerCase();
            const nameEn = p.nameEn.toLowerCase();
            const descAz = (p.descAz || '').toLowerCase();
            const descEn = (p.descEn || '').toLowerCase();
            
            // Check exact match first
            if (nameAz.includes(searchQuery) || nameEn.includes(searchQuery) || 
                descAz.includes(searchQuery) || descEn.includes(searchQuery)) {
                return true;
            }
            
            // Fuzzy match
            return calculateSimilarity(searchQuery, nameAz) > 0.6 || 
                   calculateSimilarity(searchQuery, nameEn) > 0.6;
        });
        
        // Sort by relevance
        filtered.sort((a, b) => {
            const scoreA = Math.max(
                calculateSimilarity(searchQuery, a.nameAz.toLowerCase()),
                calculateSimilarity(searchQuery, a.nameEn.toLowerCase())
            );
            const scoreB = Math.max(
                calculateSimilarity(searchQuery, b.nameAz.toLowerCase()),
                calculateSimilarity(searchQuery, b.nameEn.toLowerCase())
            );
            return scoreB - scoreA;
        });
    } else if (currentCategory) {
        filtered = filtered.filter(p => p.categoryId === currentCategory);
    }
    
    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="text-center py-12">
                <i class="fas fa-search text-4xl text-gray-200 mb-4"></i>
                <p class="text-gray-500">${translations[currentLang].noProducts}</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = filtered.map((product, index) => {
        const name = currentLang === 'az' ? product.nameAz : product.nameEn;
        const desc = currentLang === 'az' ? product.descAz : product.descEn;
        const displayName = searchQuery ? highlightMatch(name, searchQuery) : name;
        
        const hasMultipleImages = product.images && product.images.length > 1;
        const image1 = product.images?.[0] || 'https://via.placeholder.com/100x140?text=No+Image';
        const image2 = product.images?.[1] || image1;
        
        const isFavorite = favorites.includes(product.id);
        
        return `
            <div class="product-card flex gap-4 animate-fade-in" style="animation-delay: ${index * 0.05}s">
                <!-- Image Gallery -->
                <div class="image-gallery" onclick="openImageModal(${product.id})">
                    <img src="${image1}" class="gallery-image active" id="gallery-img-1-${product.id}">
                    <img src="${image2}" class="gallery-image inactive" id="gallery-img-2-${product.id}">
                    
                    ${hasMultipleImages ? `
                    <div class="gallery-nav">
                        <div class="gallery-dot active" onclick="event.stopPropagation(); switchGalleryImage(${product.id}, 1)"></div>
                        <div class="gallery-dot" onclick="event.stopPropagation(); switchGalleryImage(${product.id}, 2)"></div>
                    </div>
                    ` : ''}
                </div>
                
                <!-- Content -->
                <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-2">
                        <div class="min-w-0">
                            <h3 class="font-semibold text-gray-900 text-lg leading-tight mb-1">${displayName}</h3>
                            ${desc ? `<p class="text-sm text-gray-500 line-clamp-2">${desc}</p>` : ''}
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4 mt-2 text-xs text-gray-400">
                        ${product.specs?.volume ? `
                            <span class="flex items-center gap-1">
                                <i class="fas fa-glass-whiskey"></i>
                                ${product.specs.volume}
                            </span>
                        ` : ''}
                        ${product.specs?.time ? `
                            <span class="flex items-center gap-1">
                                <i class="far fa-clock"></i>
                                ${product.specs.time}
                            </span>
                        ` : ''}
                    </div>
                    
                    <div class="flex items-center justify-between mt-3">
                        <span class="price-tag">${product.price} AZN</span>
                        
                        <div class="flex items-center gap-2">
                            ${product.popular ? '<span class="text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-full"><i class="fas fa-star mr-1"></i>Popular</span>' : ''}
                            
                            <button class="favorite-btn ${isFavorite ? 'active' : ''}" 
                                    onclick="event.stopPropagation(); toggleFavorite(${product.id}, this)">
                                <i class="${isFavorite ? 'fas' : 'far'} fa-heart"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
    
    // Start gallery rotations
    startGalleryRotations();
}

// Gallery image switching
function switchGalleryImage(productId, imageNum) {
    const img1 = document.getElementById(`gallery-img-1-${productId}`);
    const img2 = document.getElementById(`gallery-img-2-${productId}`);
    
    if (!img1 || !img2) return;
    
    if (imageNum === 1) {
        img1.classList.add('active');
        img1.classList.remove('inactive');
        img2.classList.remove('active');
        img2.classList.add('inactive');
    } else {
        img2.classList.add('active');
        img2.classList.remove('inactive');
        img1.classList.remove('active');
        img1.classList.add('inactive');
    }
    
    // Update dots
    const dots = img1.parentElement.querySelectorAll('.gallery-dot');
    dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === imageNum - 1);
    });
}

function startGalleryRotations() {
    // Auto-switch gallery images every 3 seconds
    products.forEach(product => {
        if (product.images && product.images.length > 1) {
            let currentImage = 1;
            setInterval(() => {
                currentImage = currentImage === 1 ? 2 : 1;
                switchGalleryImage(product.id, currentImage);
            }, 3000);
        }
    });
}

// ============================================
// IMAGE MODAL
// ============================================
function openImageModal(productId) {
    const product = products.find(p => p.id === productId);
    if (!product || !product.images) return;
    
    modalImages = product.images;
    currentModalImage = 0;
    
    const gallery = document.getElementById('modal-gallery');
    const dots = document.getElementById('modal-dots');
    
    gallery.innerHTML = modalImages.map((img, idx) => `
        <img src="${img}" class="modal-image ${idx === 0 ? 'active' : ''}" data-index="${idx}">
    `).join('');
    
    dots.innerHTML = modalImages.map((_, idx) => `
        <div class="w-2 h-2 rounded-full ${idx === 0 ? 'bg-white' : 'bg-white/40'}" onclick="goToModalImage(${idx})"></div>
    `).join('');
    
    document.getElementById('image-modal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeImageModal(event) {
    if (event && event.target !== event.currentTarget && !event.target.closest('button')) return;
    document.getElementById('image-modal').classList.remove('active');
    document.body.style.overflow = '';
}

function changeModalImage(direction) {
    const newIndex = (currentModalImage + direction + modalImages.length) % modalImages.length;
    goToModalImage(newIndex);
}

function goToModalImage(index) {
    const images = document.querySelectorAll('.modal-image');
    const dots = document.getElementById('modal-dots').children;
    
    images[currentModalImage].classList.remove('active');
    dots[currentModalImage].classList.remove('bg-white');
    dots[currentModalImage].classList.add('bg-white/40');
    
    currentModalImage = index;
    
    images[currentModalImage].classList.add('active');
    dots[currentModalImage].classList.remove('bg-white/40');
    dots[currentModalImage].classList.add('bg-white');
}

// ============================================
// FAVORITES
// ============================================
function toggleFavorite(productId, btn) {
    const index = favorites.indexOf(productId);
    
    if (index > -1) {
        favorites.splice(index, 1);
        btn.classList.remove('active');
        btn.innerHTML = '<i class="far fa-heart"></i>';
    } else {
        favorites.push(productId);
        btn.classList.add('active');
        btn.innerHTML = '<i class="fas fa-heart"></i>';
        
        // Animation
        btn.style.transform = 'scale(1.2)';
        setTimeout(() => btn.style.transform = 'scale(1)', 200);
    }
    
    localStorage.setItem('favorites', JSON.stringify(favorites));
}

// ============================================
// SETTINGS
// ============================================
function updateSettings() {
    const name = currentLang === 'az' ? (settings.nameAz || settings.nameEn) : (settings.nameEn || settings.nameAz);
    document.getElementById('restaurant-name').textContent = name || 'Restaurant';
    document.getElementById('restaurant-subtitle').textContent = settings.nameAz || '';
    
    if (settings.logo) {
        document.getElementById('header-logo').innerHTML = `<img src="${settings.logo}" class="w-full h-full object-contain">`;
    }
    
    const address = currentLang === 'az' ? (settings.addressAz || settings.addressEn) : (settings.addressEn || settings.addressAz);
    document.getElementById('venue-address').textContent = address || 'Address not set';
    document.getElementById('venue-phone').textContent = settings.phone || 'Phone not set';
    document.getElementById('working-hours').textContent = settings.workWeekday || '07:00 - 24:00';
    
    // Social links
    const socialContainer = document.getElementById('social-links');
    let socialHtml = '';
    if (settings.instagram) {
        socialHtml += `<a href="${settings.instagram}" target="_blank" class="w-11 h-11 bg-gray-100 rounded-xl flex items-center justify-center text-gray-600 hover:bg-pink-100 hover:text-pink-600 transition-colors"><i class="fab fa-instagram text-lg"></i></a>`;
    }
    if (settings.facebook) {
        socialHtml += `<a href="${settings.facebook}" target="_blank" class="w-11 h-11 bg-gray-100 rounded-xl flex items-center justify-center text-gray-600 hover:bg-blue-100 hover:text-blue-600 transition-colors"><i class="fab fa-facebook-f text-lg"></i></a>`;
    }
    if (settings.whatsapp) {
        socialHtml += `<a href="https://wa.me/${settings.whatsapp}" target="_blank" class="w-11 h-11 bg-gray-100 rounded-xl flex items-center justify-center text-gray-600 hover:bg-green-100 hover:text-green-600 transition-colors"><i class="fab fa-whatsapp text-lg"></i></a>`;
    }
    socialContainer.innerHTML = socialHtml;
}

// ============================================
// LANGUAGE
// ============================================
function toggleLanguage() {
    currentLang = currentLang === 'en' ? 'az' : 'en';
    document.getElementById('current-lang').textContent = currentLang.toUpperCase();
    
    // Update placeholders
    document.getElementById('search-input').placeholder = translations[currentLang].search;
    document.getElementById('mobile-search-input').placeholder = translations[currentLang].search;
    
    // Update data attributes
    document.querySelectorAll('[data-az][data-en]').forEach(el => {
        el.textContent = el.getAttribute(`data-${currentLang}`);
    });
    
    renderCategories();
    renderHeroSlider();
    renderProducts();
    updateSettings();
}

// ============================================
// MOBILE MODALS
// ============================================
function showMobileCategories() {
    document.getElementById('mobile-categories-modal').classList.remove('hidden');
}

function showMobileSearch() {
    document.getElementById('mobile-search-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('mobile-search-input').focus(), 100);
}

function showMobileInfo() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeMobileModal(event, modalId) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById(modalId).classList.add('hidden');
}

// ============================================
// KEYBOARD NAVIGATION
// ============================================
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeImageModal();
        closeMobileModal(null, 'mobile-categories-modal');
        closeMobileModal(null, 'mobile-search-modal');
    }
    
    if (document.getElementById('image-modal').classList.contains('active')) {
        if (e.key === 'ArrowLeft') changeModalImage(-1);
        if (e.key === 'ArrowRight') changeModalImage(1);
    }
});
</script>
