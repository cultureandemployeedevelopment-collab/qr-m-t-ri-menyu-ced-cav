<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Premium QR Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f8f5;
      --card: #ffffff;
      --text: #1d2939;
      --muted: #667085;
      --line: #e6e8ec;
      --brand: #0f766e;
      --brand-2: #14b8a6;
      --gold: #b35b00;
      --shadow: 0 10px 28px rgba(16, 24, 40, 0.07);
      --radius: 24px;
      --header-h: 72px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 82px;
    }

    @media (min-width: 1024px) {
      body { padding-bottom: 0; }
    }

    .glass {
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(14px);
    }

    .shadow-premium { box-shadow: var(--shadow); }

    .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cfd4dc; border-radius: 999px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }

    .category-pill {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 9px 13px;
      white-space: nowrap;
      transition: .22s ease;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .category-pill:hover { border-color: #99f6e4; }

    .category-pill.active {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: white;
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(20, 184, 166, .24);
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 18px;
      padding: 12px 14px;
      transition: .2s ease;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .sidebar-link:hover { background: #f0f7f6; }

    .sidebar-link.active {
      background: #dff2ec;
      color: #0f766e;
      font-weight: 700;
    }

    .hero {
      position: relative;
      min-height: 480px;
      border-radius: 28px;
      overflow: hidden;
      background: #d4d7dd;
      border: 1px solid var(--line);
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.55) 0%, rgba(0,0,0,.18) 28%, rgba(0,0,0,.03) 55%, rgba(0,0,0,0) 100%);
    }

    .hero-copy {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 18px;
      color: white;
      z-index: 2;
    }

    .ai-search-wrap {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: white;
      min-height: 52px;
      padding: 0 10px 0 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      width: 100%;
    }

    .ai-search-wrap::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(120deg, rgba(20,184,166,.12), rgba(124,58,237,.12), rgba(20,184,166,.12));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: pulseGlow 2.2s linear infinite;
      pointer-events: none;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: .45; }
      50% { opacity: .95; }
    }

    .ai-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #081a32, #112a4b);
      color: white;
      box-shadow: 0 8px 18px rgba(11, 26, 49, 0.2);
      animation: floatBadge 1.9s ease-in-out infinite;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 700;
      border: none;
      max-width: 120px;
      white-space: nowrap;
    }

    @keyframes floatBadge {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .recommended-track {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scroll-snap-type: x mandatory;
      padding-bottom: 4px;
    }

    .recommended-card {
      min-width: 200px;
      max-width: 200px;
      border-radius: 22px;
      overflow: hidden;
      background: white;
      border: 1px solid var(--line);
      scroll-snap-align: start;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: .22s ease;
    }

    .recommended-card:hover { transform: translateY(-3px); }

    .recommended-card img {
      width: 100%;
      height: 125px;
      object-fit: cover;
      transition: transform .4s ease;
      display: block;
    }

    .recommended-card:hover img { transform: scale(1.05); }

    .food-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .22s ease, box-shadow .22s ease;
      cursor: pointer;
    }

    .food-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 34px rgba(17, 24, 39, 0.11);
    }

    .food-card-image {
      overflow: hidden;
      height: 165px;
      background: #eef2f6;
    }

    .food-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s ease;
      display: block;
    }

    .food-card:hover .food-card-image img { transform: scale(1.06); }

    .detail-modal {
      position: fixed;
      inset: 0;
      background: rgba(7, 12, 22, .6);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .detail-modal.active { display: flex; }

    .detail-card {
      width: 100%;
      max-width: 690px;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 28px 60px rgba(0,0,0,.24);
      animation: modalRise .22s ease;
      position: relative;
    }

    @keyframes modalRise {
      from { opacity: 0; transform: scale(.97) translateY(14px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .detail-cover {
      width: 100%;
      height: 310px;
      object-fit: cover;
      display: block;
      background: #eef2f6;
    }

    .detail-close {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: none;
      background: rgba(183,121,31,.93);
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    .mobile-bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      padding: 12px 16px;
      display: flex;
      justify-content: space-around;
      z-index: 70;
    }

    @media (min-width: 1024px) {
      .mobile-bottom-bar { display: none; }
    }

    .hide-desktop { display: block; }

    @media (min-width: 1024px) {
      .hide-desktop { display: none; }
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (max-width: 1023px) {
      .hero { min-height: 360px; }
    }

    @media (max-width: 767px) {
      .hero {
        min-height: 265px;
        border-radius: 22px;
      }

      .hero-copy {
        left: 16px;
        right: 16px;
        bottom: 12px;
      }

      .detail-cover { height: 220px; }

      .recommended-card {
        min-width: 165px;
        max-width: 165px;
      }

      .recommended-card img {
        height: 105px;
      }

      .food-card-image { height: 145px; }

      .ai-search-wrap {
        min-height: 48px;
        padding: 0 8px 0 12px;
        gap: 6px;
      }

      .ai-badge {
        padding: 6px 8px;
        font-size: 10px;
        max-width: 86px;
      }

      .category-pill {
        font-size: 11px;
        padding: 8px 11px;
      }
    }

    /* Loading shimmer */
    .shimmer {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <header class="sticky top-0 z-40 glass border-b border-gray-100" style="height: var(--header-h);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
      <div class="flex items-center gap-3 min-w-0">
        <div id="header-logo" class="w-11 h-11 rounded-2xl bg-gray-100 flex items-center justify-center overflow-hidden flex-shrink-0">

        <div class="min-w-0">
          <h1 id="restaurant-name" class="font-extrabold text-base sm:text-lg text-gray-900 truncate">Yüklənir...</h1>
          <p id="restaurant-subtitle" class="text-[11px] sm:text-xs text-gray-500 truncate">QR Menyu</p>
        </div>
      </div>
      <button onclick="toggleLanguage()" class="h-10 sm:h-11 px-3 sm:px-4 border border-gray-200 rounded-2xl bg-white shadow-premium flex items-center gap-2 font-bold text-xs sm:text-sm">
        <span id="current-lang">AZ</span>
        <i class="fas fa-chevron-down text-[10px] sm:text-xs text-gray-400"></i>
      </button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 sm:py-6">
    <section id="hero-section" class="mb-5 sm:mb-6">

        <div class="hero-overlay"></div>
        <div class="hero-copy">
          <div class="text-[28px] sm:text-[36px] md:text-[44px] font-extrabold leading-tight">Yüklənir...</div>
        </div>
      </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 lg:gap-6">
      <aside class="hidden lg:block lg:col-span-3">
        <div class="sticky top-24 space-y-4">
          <div class="bg-[#f8f2dc] border border-[#edd68b] rounded-[26px] p-5 shadow-premium">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-[#f2e6b0] rounded-[18px] flex items-center justify-center text-[#d97706] text-xl">
                <i class="fas fa-location-dot"></i>
              </div>
              <div>
                <p class="font-bold text-[16px] leading-tight" data-az="Buradasınız" data-en="You are here">Buradasınız</p>
                <p class="text-sm text-gray-500" id="table-indicator-text">QR Menu</p>
              </div>
            </div>
          </div>

          <div class="sidebar-link" onclick="filterPopular()">
            <i class="fas fa-star text-amber-500 text-base"></i>
            <span data-az="Populyar" data-en="Popular">Populyar</span>
          </div>

          <div class="sidebar-link" onclick="showFavoritesOnly()">
            <i class="fas fa-heart text-red-500 text-base"></i>
            <span data-az="Seçilənlər" data-en="Favorites">Seçilənlər</span>
          </div>

          <p class="text-[11px] text-gray-400 uppercase tracking-wider font-extrabold px-4 pt-2" data-az="Kateqoriyalar" data-en="Categories">Kateqoriyalar</p>
          <nav id="categories-list" class="space-y-2 custom-scroll max-h-[60vh] overflow-y-auto">
            <div class="sidebar-link shimmer h-12 rounded-[18px]"></div>
            <div class="sidebar-link shimmer h-12 rounded-[18px]"></div>
            <div class="sidebar-link shimmer h-12 rounded-[18px]"></div>
          </nav>
        </div>
      </aside>

      <main class="lg:col-span-6 space-y-5 sm:space-y-6">
        <div class="hide-desktop overflow-x-auto custom-scroll">
          <div id="mobile-category-slider" class="flex gap-2 min-w-max">
            <div class="category-pill shimmer w-24 h-10 rounded-full"></div>
            <div class="category-pill shimmer w-28 h-10 rounded-full"></div>
            <div class="category-pill shimmer w-20 h-10 rounded-full"></div>
          </div>
        </div>

        <section id="recommended-section" class="bg-white rounded-[24px] sm:rounded-[28px] border border-gray-200 p-4 sm:p-5 shadow-premium">
          <div class="flex items-center justify-between mb-4 gap-3">
            <div class="shimmer h-8 w-48 rounded-lg"></div>
            <div class="flex gap-2">
              <div class="shimmer w-10 h-10 rounded-full"></div>
              <div class="shimmer w-10 h-10 rounded-full"></div>
            </div>
          </div>
          <div class="flex gap-4">
            <div class="shimmer w-40 h-32 rounded-2xl"></div>
            <div class="shimmer w-40 h-32 rounded-2xl"></div>
          </div>
        </section>

        <section class="bg-white rounded-[24px] sm:rounded-[28px] border border-gray-200 p-4 sm:p-6 shadow-premium">

            <div class="shimmer h-8 w-32 mb-2 rounded-lg"></div>
            <div class="shimmer h-4 w-24 rounded"></div>
          </div>
          <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
            <div class="food-card shimmer h-64 rounded-[22px]"></div>
            <div class="food-card shimmer h-64 rounded-[22px]"></div>
            <div class="food-card shimmer h-64 rounded-[22px]"></div>
            <div class="food-card shimmer h-64 rounded-[22px]"></div>
          </div>
        </section>

        <footer class="text-center text-xs sm:text-sm text-gray-500 pb-6 pt-1 px-2">
          Korporativ Mədəniyyət və İşçilərin İnkişafı Komandası tərəfindən hazırlanıb.
        </footer>
      </main>

      <aside class="hidden lg:block lg:col-span-3">
        <div class="sticky top-24 space-y-4">
          <div class="ai-search-wrap">

            <button type="button" class="ai-badge" onclick="focusSearch()" aria-label="Ağıllı axtarış">

          </div>

                </div>
              </div>

              <div class="flex items-start gap-4">
                <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-[18px] bg-gray-100 flex items-center justify-center text-base sm:text-lg text-gray-600"><i class="fas fa-phone"></i></div>
                <div>
                  <p class="text-gray-400 text-xs sm:text-sm" data-az="Telefon" data-en="Phone">Telefon</p>
                  <p id="venue-phone" class="font-semibold text-[14px] sm:text-[15px] leading-snug">-</p>
                </div>
              </div>
            </div>
          </div>

          <div id="social-links" class="flex gap-3"></div>
        </div>
      </aside>
    </div>
  </div>

  <div class="mobile-bottom-bar">
    <button onclick="showMobileCategories()" class="flex flex-col items-center gap-1 text-gray-600">
      <i class="fas fa-list text-lg"></i>
      <span class="text-[11px] font-semibold" data-az="Kateqoriya" data-en="Categories">Kateqoriya</span>
    </button>
    <button onclick="showMobileSearch()" class="flex flex-col items-center gap-1 text-gray-600">
      <i class="fas fa-wand-magic-sparkles text-lg"></i>
      <span class="text-[11px] font-semibold" data-az="Axtarış" data-en="Search">Axtarış</span>
    </button>
    <button onclick="showFavoritesOnly()" class="flex flex-col items-center gap-1 text-gray-600">
      <i class="fas fa-heart text-lg"></i>
      <span class="text-[11px] font-semibold" data-az="Seçilənlər" data-en="Favorites">Seçilənlər</span>
    </button>
  </div>

  <div id="mobile-categories-modal" class="fixed inset-0 bg-black/50 z-50 hidden" onclick="closeMobileModal(event, 'mobile-categories-modal')">

      <div class="flex items-center justify-between mb-5">
        <h3 class="font-extrabold text-lg sm:text-xl" data-az="Kateqoriyalar" data-en="Categories">Kateqoriyalar</h3>
        <button onclick="closeMobileModal(null, 'mobile-categories-modal')" class="w-10 h-10 rounded-full bg-gray-100"><i class="fas fa-times"></i></button>
      </div>
      <div id="mobile-categories-list" class="space-y-2"></div>
    </div>
  </div>

  <div id="mobile-search-modal" class="fixed inset-0 bg-black/50 z-50 hidden" onclick="closeMobileModal(event, 'mobile-search-modal')">
    <div class="absolute top-20 left-4 right-4 bg-white rounded-[24px] p-4 shadow-premium" onclick="event.stopPropagation()">
      <div class="ai-search-wrap">
        <i class="fas fa-magnifying-glass text-gray-400 text-base"></i>

          <i class="fas fa-wand-magic-sparkles text-emerald-400 text-[10px]"></i>

        </button>
      </div>

  </div>

  <div id="detail-modal" class="detail-modal" onclick="closeDetailModal(event)">
    <div id="detail-card" class="detail-card" onclick="event.stopPropagation()"></div>
  </div>

          recommended: true, 
          available: true, 
          images: ['https://images.unsplash.com/photo-1546793665-c74683f339c1?q=80&w=600&auto=format&fit=crop'],
          ingredientsAz: 'Toyuq, kahı, parmezan, sous',
          ingredientsEn: 'Chicken, lettuce, parmesan, dressing',
          allergensAz: 'Süd, yumurta',
          allergensEn: 'Dairy, egg'
        },
        { 
          id: 3, 
          categoryId: 3, 
          nameAz: 'Ev Limonadı', 
          nameEn: 'Homemade Lemonade', 
          descAz: 'Təravətli ev limonadı', 
          descEn: 'Fresh homemade lemonade', 
          price: 5, 
          popular: false, 
          recommended: false, 
          available: true, 
          images: ['https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=600&auto=format&fit=crop'],
          ingredientsAz: 'Limon, su, şəkər',
          ingredientsEn: 'Lemon, water, sugar',
          allergensAz: '-',
          allergensEn: '-'
        }
      ],
      settings: {
        nameAz: 'Panorama Restaurant',
        nameEn: 'Panorama Restaurant',
        phone: '+994502903931',
        addressAz: 'Qafqaz Riverside Hotel, Qəbələ, Azərbaycan',
        addressEn: 'Qafqaz Riverside Hotel, Gabala, Azerbaijan',
        workWeekday: '07:00 - 24:00',
        workWeekend: '07:00 - 24:00',
        heroTitleAz: 'Panorama',
        heroTitleEn: 'Panorama',
        heroImage: 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?q=80&w=1200&auto=format&fit=crop',
        smartSearchBadge: 'true',
        recommendedIds: '[1,2]'
      }
    };

    // ==========================================
    // STATE
    // ==========================================
    let currentLang = 'az';
    let categories = [];
    let products = [];
    let settings = {};
    let favorites = JSON.parse(localStorage.getItem('menu_favorites') || '[]');
    let currentCategory = null;
    let currentFilterMode = 'category';
    let searchQuery = '';
    let refreshTimer = null;
    let searchDebounceTimer = null;

    // ==========================================
    // UTILITY FUNCTIONS
    // ==========================================
    function safeText(v) { return v == null ? '' : String(v); }

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getLocalized(fieldAz, fieldEn) {
      return currentLang === 'az' ? (fieldAz || fieldEn || '') : (fieldEn || fieldAz || '');
    }

    function getCategoryById(id) {
      return categories.find(c => Number(c.id) === Number(id));
    }

    // ==========================================
    // CACHE FUNCTIONS
    // ==========================================
    function getCache() {
      try {
        const cached = localStorage.getItem(CONFIG.CACHE_KEY);
        if (!cached) return null;
        const { data, timestamp } = JSON.parse(cached);
        if (Date.now() - timestamp > CONFIG.CACHE_TIME) return null;
        return data;
      } catch {
        return null;
      }
    }

    function setCache(data) {
      try {
        localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({
          data,
          timestamp: Date.now()
        }));
      } catch (e) {
        console.error('Cache error:', e);
      }
    }

    // ==========================================
    // DATA LOADING - ƏSAS FUNKSIYA
    // ==========================================
    async function loadData() {
      // 1. Dərhal fallback data göstər
      showFallbackData();
      
      // 2. Cache'dən oxu (əgər varsa)
      const cached = getCache();
      if (cached) {
        updateData(cached);
        renderAll();
      }
      
      // 3. Serverdən yenilə
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        
        const res = await fetch(CONFIG.GAS_URL + '?action=getMenu&t=' + Date.now(), {
          signal: controller.signal,
          cache: 'no-store'
        });
        
        clearTimeout(timeoutId);
        
        if (!res.ok) throw new Error('HTTP error: ' + res.status);
        
        const data = await res.json();
        
        if (data.categories && data.products) {
          updateData(data);
          setCache(data);
          renderAll();
        }
      } catch (error) {
        console.error('Fetch error:', error);
        // Fallback artıq göstərilib, heç nə etmə
      }
    }

    function showFallbackData() {
      updateData(FALLBACK_DATA);
      renderAll();
    }

    function updateData(data) {
      categories = data.categories || [];
      products = data.products || [];
      settings = data.settings || {};
      
      if (!currentCategory && categories.length > 0) {
        const active = categories.filter(c => c.active !== false).sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));
        if (active.length) currentCategory = Number(active[0].id);
      }
    }

    // ==========================================
    // RENDER FUNCTIONS
    // ==========================================
    function renderAll() {
      updateHeader();
      renderHero();
      renderRecommended();
      renderCategories();
      renderProducts();
      renderInfo();
      renderSocials();
      updateTextLabels();
    }

    function updateHeader() {
      const name = getLocalized(settings.nameAz, settings.nameEn) || 'Restaurant';
      document.getElementById('restaurant-name').textContent = name;
      document.getElementById('restaurant-subtitle').textContent = name;
      document.getElementById('current-lang').textContent = currentLang.toUpperCase();
      
      if (settings.logo) {
        document.getElementById('header-logo').innerHTML = 
          `<img src="${settings.logo}" class="w-full h-full object-contain">`;
      }
    }

    function renderHero() {
      const title = getLocalized(settings.heroTitleAz, settings.heroTitleEn) || 
                    getLocalized(settings.nameAz, settings.nameEn);
      const sub = getLocalized(settings.nameAz, settings.nameEn);
      const img = settings.heroImage || FALLBACK_DATA.settings.heroImage;

      document.getElementById('hero-section').innerHTML = `
        <div class="hero shadow-premium">
          <img src="${img}" alt="Banner" loading="eager">
          <div class="hero-overlay"></div>
          <div class="hero-copy">
            <div class="text-[28px] sm:text-[36px] md:text-[44px] font-extrabold leading-tight">${escapeHtml(title)}</div>
            <div class="text-sm sm:text-base md:text-lg text-white/90 mt-1.5">${escapeHtml(sub)}</div>
          </div>
        </div>
      `;
    }

    function getRecommendedProducts() {
      let ids = [];
      try { ids = JSON.parse(settings.recommendedIds || '[]'); } catch {}
      let items = products.filter(p => ids.includes(p.id) || ids.includes(String(p.id)));
      if (!items.length) items = products.filter(p => p.recommended || p.popular).slice(0, 6);
      return items.filter(p => p.available !== false);
    }

    function renderRecommended() {
      const rec = getRecommendedProducts();
      const html = rec.map(p => `
        <article class="recommended-card" onclick="openDetail(${p.id})">
          <img src="${p.images?.[0] || 'https://via.placeholder.com/400x300?text=Food'}" 
               alt="${escapeHtml(getLocalized(p.nameAz, p.nameEn))}" loading="lazy">
          <div class="p-3 sm:p-4">
            <h4 class="font-extrabold text-[15px] sm:text-[17px] line-clamp-2">${escapeHtml(getLocalized(p.nameAz, p.nameEn))}</h4>
            <p class="mt-1 text-[12px] sm:text-sm text-gray-500 line-clamp-2">${escapeHtml(getLocalized(p.descAz, p.descEn))}</p>
            <div class="mt-2.5 text-[17px] sm:text-[19px] font-extrabold text-amber-700">${p.price} AZN</div>
          </div>
        </article>
      `).join('');

      document.getElementById('recommended-section').innerHTML = `
        <div class="flex items-center justify-between mb-4 gap-3">
          <h3 class="text-[20px] sm:text-[24px] md:text-[26px] font-extrabold leading-tight" 
              data-az="Tövsiyə olunan yeməklər" data-en="Recommended dishes">
            ${currentLang === 'az' ? 'Tövsiyə olunan yeməklər' : 'Recommended dishes'}
          </h3>
          <div class="flex items-center gap-2">
            <button onclick="slideRec(-1)" class="w-9 h-9 sm:w-10 sm:h-10 rounded-full border border-gray-200 bg-white hover:bg-gray-50">
              <i class="fas fa-chevron-left text-xs sm:text-sm"></i>
            </button>
            <button onclick="slideRec(1)" class="w-9 h-9 sm:w-10 sm:h-10 rounded-full border border-gray-200 bg-white hover:bg-gray-50">
              <i class="fas fa-chevron-right text-xs sm:text-sm"></i>
            </button>
          </div>
        </div>
        <div id="rec-track" class="recommended-track custom-scroll">${html}</div>
      `;
    }

    function slideRec(dir) {
      const track = document.getElementById('rec-track');
      if (!track) return;
      const scrollAmount = 220;
      track.scrollBy({ left: dir * scrollAmount, behavior: 'smooth' });
    }

    function renderCategories() {
      const active = categories.filter(c => c.active !== false)
        .sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));

      const makeLink = (cat, isMobile = false) => `
        <div class="${isMobile ? 'sidebar-link' : 'sidebar-link'} ${currentFilterMode === 'category' && currentCategory === cat.id ? 'active' : ''}" 
             onclick="selectCategory(${cat.id}${isMobile ? `; closeMobileModal(null,'mobile-categories-modal')` : ''})"
             ${!isMobile ? `data-cat-id="${cat.id}"` : ''}>
          <span class="text-base">${cat.icon || '🍽️'}</span>
          <span>${escapeHtml(getLocalized(cat.nameAz, cat.nameEn))}</span>
        </div>
      `;

      const makePill = (cat) => `
        <button class="category-pill ${currentFilterMode === 'category' && currentCategory === cat.id ? 'active' : ''}" 
                onclick="selectCategory(${cat.id})" data-cat-id="${cat.id}">
          <span class="mr-1">${cat.icon || '🍽️'}</span>${escapeHtml(getLocalized(cat.nameAz, cat.nameEn))}
        </button>
      `;

      document.getElementById('categories-list').innerHTML = active.map(c => makeLink(c)).join('');
      document.getElementById('mobile-categories-list').innerHTML = active.map(c => makeLink(c, true)).join('');
      document.getElementById('mobile-category-slider').innerHTML = active.map(c => makePill(c)).join('');
    }

    function renderProducts() {
      let filtered = products.filter(p => p.available !== false);
      
      if (currentFilterMode === 'popular') {
        filtered = filtered.filter(p => p.popular);
      } else if (currentFilterMode === 'favorites') {
        filtered = filtered.filter(p => favorites.includes(p.id));
      } else if (currentFilterMode === 'search' && searchQuery) {
        filtered = products.filter(p => {
          const text = [p.nameAz, p.nameEn, p.descAz, p.descEn].join(' ').toLowerCase();
          return text.includes(searchQuery.toLowerCase());
        });
      } else {
        filtered = filtered.filter(p => p.categoryId === currentCategory);
      }

      // Update headers
      const titleEl = document.querySelector('#products-grid').previousElementSibling.querySelector('h2');
      const subEl = document.querySelector('#products-grid').previousElementSibling.querySelector('p');
      
      if (currentFilterMode === 'popular') {
        titleEl.textContent = currentLang === 'az' ? 'Populyar yeməklər' : 'Popular dishes';
        subEl.textContent = currentLang === 'az' ? 'Ən çox seçilənlər' : 'Most selected';
      } else if (currentFilterMode === 'favorites') {
        titleEl.textContent = currentLang === 'az' ? 'Seçilənlər' : 'Favorites';
        subEl.textContent = currentLang === 'az' ? 'Bəyəndiyiniz yeməklər' : 'Your favorites';
      } else if (currentFilterMode === 'search') {
        titleEl.textContent = currentLang === 'az' ? 'Axtarış nəticələri' : 'Search results';
        subEl.textContent = searchQuery ? `"${searchQuery}"` : '';
      } else {
        const cat = getCategoryById(currentCategory);
        titleEl.textContent = cat ? getLocalized(cat.nameAz, cat.nameEn) : 'Menu';
        subEl.textContent = currentLang === 'az' ? 'Bütün yeməklər' : 'All dishes';
      }

      // Update active states
      document.querySelectorAll('[data-cat-id]').forEach(el => {
        el.classList.toggle('active', 
          currentFilterMode === 'category' && Number(el.dataset.catId) === currentCategory);
      });

      if (!filtered.length) {
        document.getElementById('products-grid').innerHTML = `
          <div class="sm:col-span-2 text-center py-12 text-gray-500">
            ${currentLang === 'az' ? 'Məhsul tapılmadı' : 'No dishes found'}
          </div>`;
        return;
      }

      document.getElementById('products-grid').innerHTML = filtered.map(p => `
        <article class="food-card" onclick="openDetail(${p.id})">
          <div class="food-card-image">
            <img src="${p.images?.[0] || 'https://via.placeholder.com/600x400?text=Food'}" 
                 alt="${escapeHtml(getLocalized(p.nameAz, p.nameEn))}" loading="lazy">
          </div>
          <div class="p-4 sm:p-5">
            <div class="flex items-start justify-between gap-3">
              <h3 class="text-[18px] sm:text-[20px] font-extrabold leading-tight">${escapeHtml(getLocalized(p.nameAz, p.nameEn))}</h3>
              <button class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 flex items-center justify-center ${favorites.includes(p.id) ? 'text-red-500' : 'text-gray-500'}" 
                      onclick="event.stopPropagation(); toggleFav(${p.id}, this)">
                <i class="${favorites.includes(p.id) ? 'fas' : 'far'} fa-heart text-sm"></i>
              </button>
            </div>
            <p class="mt-2 text-[12px] sm:text-sm text-gray-500 line-clamp-2">${escapeHtml(getLocalized(p.descAz, p.descEn))}</p>
            <div class="mt-3 sm:mt-4 text-[18px] sm:text-[20px] font-extrabold text-amber-700">${p.price} AZN</div>
          </div>
        </article>
      `).join('');
    }

    function renderInfo() {
      document.getElementById('working-hours').textContent = settings.workWeekday || '07:00 - 24:00';
      document.getElementById('venue-address').textContent = 
        getLocalized(settings.addressAz, settings.addressEn) || 'Address not set';
      document.getElementById('venue-phone').textContent = settings.phone || '-';
      
      const table = new URLSearchParams(window.location.search).get('table');
      document.getElementById('table-indicator-text').textContent = table ? `Masa ${table}` : 'QR Menu';
    }

    function renderSocials() {
      let html = '';
      if (settings.whatsapp) {
        const num = String(settings.whatsapp).replace(/\D/g, '');
        html += `<a href="https://wa.me/${num}" target="_blank" class="w-12 h-12 sm:w-14 sm:h-14 rounded-[18px] border border-gray-200 bg-white flex items-center justify-center shadow-premium text-lg sm:text-xl"><i class="fab fa-whatsapp"></i></a>`;
      }
      if (settings.instagram) {
        html += `<a href="${settings.instagram}" target="_blank" class="w-12 h-12 sm:w-14 sm:h-14 rounded-[18px] border border-gray-200 bg-white flex items-center justify-center shadow-premium text-lg sm:text-xl"><i class="fab fa-instagram"></i></a>`;
      }
      if (settings.facebook) {
        html += `<a href="${settings.facebook}" target="_blank" class="w-12 h-12 sm:w-14 sm:h-14 rounded-[18px] border border-gray-200 bg-white flex items-center justify-center shadow-premium text-lg sm:text-xl"><i class="fab fa-facebook-f"></i></a>`;
      }
      document.getElementById('social-links').innerHTML = html;
    }

    function updateTextLabels() {
      document.querySelectorAll('[data-az][data-en]').forEach(el => {
        el.textContent = el.getAttribute(`data-${currentLang}`);
      });
      
      const searchPlaceholder = currentLang === 'az' ? 'Ağıllı axtarış...' : 'Smart search...';
      document.getElementById('search-input').placeholder = searchPlaceholder;
      const mobileSearch = document.getElementById('mobile-search-input');
      if (mobileSearch) mobileSearch.placeholder = searchPlaceholder;
      
      document.getElementById('smart-search-label').textContent = 
        currentLang === 'az' ? 'Ağıllı Axtarış' : 'Smart Search';
    }

    // ==========================================
    // INTERACTION FUNCTIONS
    // ==========================================
    function selectCategory(id) {
      currentCategory = Number(id);
      currentFilterMode = 'category';
      searchQuery = '';
      document.getElementById('search-input').value = '';
      const mobileSearch = document.getElementById('mobile-search-input');
      if (mobileSearch) mobileSearch.value = '';
      
      renderCategories();
      renderProducts();
    }

    function filterPopular() {
      currentFilterMode = 'popular';
      searchQuery = '';
      renderCategories();
      renderProducts();
    }

    function showFavoritesOnly() {
      currentFilterMode = 'favorites';
      searchQuery = '';
      renderCategories();
      renderProducts();
    }

    function debouncedSearch(value) {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        searchQuery = value.trim();
        currentFilterMode = searchQuery ? 'search' : 'category';
        renderCategories();
        renderProducts();
      }, 150);
    }

    function focusSearch() {
      document.getElementById('search-input').focus();
    }

    function focusMobileSearch() {
      const input = document.getElementById('mobile-search-input');
      if (input) input.focus();
    }

    function toggleLanguage() {
      currentLang = currentLang === 'az' ? 'en' : 'az';
      renderAll();
    }

    function toggleFav(id, btn) {
      const idx = favorites.indexOf(id);
      if (idx > -1) favorites.splice(idx, 1);
      else favorites.push(id);
      
      localStorage.setItem('menu_favorites', JSON.stringify(favorites));
      
      if (currentFilterMode === 'favorites') {
        renderProducts();
      } else {
        btn.innerHTML = `<i class="${favorites.includes(id) ? 'fas' : 'far'} fa-heart text-sm"></i>`;
        btn.className = `w-9 h-9 sm:w-10 sm:h-10 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 flex items-center justify-center ${favorites.includes(id) ? 'text-red-500' : 'text-gray-500'}`;
      }
    }

    function openDetail(id) {
      const p = products.find(x => x.id === id);
      if (!p) return;
      
      document.getElementById('detail-card').innerHTML = `
        <button class="detail-close" onclick="closeDetailModal()"><i class="fas fa-times"></i></button>
        <img class="detail-cover" src="${p.images?.[0] || 'https://via.placeholder.com/800x600?text=Food'}" alt="">
        <div class="p-5 sm:p-6 md:p-7">
          <div class="flex items-start justify-between gap-4 flex-wrap">
            <div>
              <h3 class="text-[22px] sm:text-[24px] md:text-[30px] font-extrabold leading-tight">${escapeHtml(getLocalized(p.nameAz, p.nameEn))}</h3>
              <p class="mt-2 text-sm sm:text-base text-gray-500">${escapeHtml(getLocalized(p.descAz, p.descEn))}</p>
            </div>
            <div class="text-[20px] sm:text-[22px] md:text-[28px] font-extrabold text-amber-700">${p.price} AZN</div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-5 mt-5 sm:mt-6">
            <div class="rounded-[22px] border border-gray-200 p-4 sm:p-5 bg-gray-50">
              <div class="font-extrabold text-[15px] sm:text-[16px] mb-2">${currentLang === 'az' ? 'Tərkibi' : 'Ingredients'}</div>
              <p class="text-sm sm:text-base text-gray-600 leading-6 sm:leading-7">${escapeHtml(getLocalized(p.ingredientsAz, p.ingredientsEn) || '-')}</p>
            </div>
            <div class="rounded-[22px] border border-gray-200 p-4 sm:p-5 bg-gray-50">
              <div class="font-extrabold text-[15px] sm:text-[16px] mb-2">${currentLang === 'az' ? 'Allergenlər' : 'Allergens'}</div>
              <p class="text-sm sm:text-base text-gray-600 leading-6 sm:leading-7">${escapeHtml(getLocalized(p.allergensAz, p.allergensEn) || '-')}</p>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById('detail-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeDetailModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('detail-modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    function showMobileCategories() {
      document.getElementById('mobile-categories-modal').classList.remove('hidden');
    }

    function showMobileSearch() {
      document.getElementById('mobile-search-modal').classList.remove('hidden');
      setTimeout(focusMobileSearch, 100);
    }

    function closeMobileModal(e, id) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById(id).classList.add('hidden');
    }

    // ==========================================
    // AUTO REFRESH
    // ==========================================
    function startAutoRefresh() {
      refreshTimer = setInterval(() => {
        if (!document.hidden) loadData();
      }, CONFIG.REFRESH_INTERVAL);
    }

    // ==========================================
    // INIT
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      startAutoRefresh();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeDetailModal();
        closeMobileModal(null, 'mobile-categories-modal');
        closeMobileModal(null, 'mobile-search-modal');
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) loadData();
    });
  </script>
</body>
</html>
