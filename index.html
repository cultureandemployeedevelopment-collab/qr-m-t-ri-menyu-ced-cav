<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Menyu</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f5f5f0; }
    
    .hero-gradient {
      background: linear-gradient(135deg, #0a1f0a 0%, #1a3a1a 100%);
    }
    
    .category-pill {
      transition: all 0.3s ease;
      scroll-snap-align: start;
    }
    .category-pill.active {
      background: #059669;
      color: white;
      border-color: #059669;
    }
    
    .product-card {
      transition: all 0.3s ease;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15);
    }
    
    .video-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #ef4444;
      color: white;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 10;
    }
    
    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 12px;
    }
    .product-image-container:hover .play-overlay {
      opacity: 1;
    }
    .play-button {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #059669;
      font-size: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .image-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .image-modal.active {
      display: flex;
    }
    .image-modal img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 12px;
    }
    
    .video-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .video-modal.active {
      display: flex;
    }
    .video-container {
      width: 100%;
      max-width: 900px;
      position: relative;
    }
    .video-container video {
      width: 100%;
      border-radius: 12px;
    }
    
    .popup-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 90;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .popup-modal.active {
      display: flex;
    }
    
    .banner-slider {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
    }
    .banner-slide {
      display: none;
      animation: fadeSlide 0.5s;
    }
    .banner-slide.active {
      display: block;
    }
    @keyframes fadeSlide {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .search-badge {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #059669;
      color: white;
      padding: 12px 20px;
      border-radius: 50px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(5,150,105,0.4);
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #0a1f0a;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .loading-screen.hidden {
      display: none;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(10px);
      background: rgba(245,245,240,0.95);
    }
    
    .category-scroll {
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .category-scroll::-webkit-scrollbar {
      display: none;
    }
    
    .price-tag {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }
    
    .badge-popular { background: #fbbf24; color: #92400e; }
    .badge-new { background: #10b981; color: white; }
    .badge-recommended { background: #059669; color: white; }
    .badge-unavailable { background: #ef4444; color: white; }
  </style>
</head>
<body class="text-gray-800">

<!-- Loading Screen -->
<div id="loading-screen" class="loading-screen">
  <div class="spinner"></div>
  <p class="text-lg font-medium">Menyu yüklənir...</p>
</div>

<!-- Image Modal -->
<div id="image-modal" class="image-modal" onclick="closeImageModal()">
  <img id="modal-image" src="" alt="Product Image" onclick="event.stopPropagation()">
  <button class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300" onclick="closeImageModal()">
    <i class="fas fa-times"></i>
  </button>
</div>

<!-- Video Modal -->
<div id="video-modal" class="video-modal" onclick="closeVideoModal()">
  <div class="video-container" onclick="event.stopPropagation()">
    <video id="modal-video" controls poster="">
      <source src="" type="video/mp4">
      Brauzeriniz video tag-ni dəstəkləmir.
    </video>
  </div>
  <button class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300" onclick="closeVideoModal()">
    <i class="fas fa-times"></i>
  </button>
</div>

<!-- Popup Modal -->
<div id="popup-modal" class="popup-modal" onclick="closePopup()">
  <div class="bg-white rounded-2xl max-w-md w-full overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
    <div id="popup-content">
      <img id="popup-image" src="" class="w-full h-64 object-cover hidden">
      <div class="p-6">
        <h3 id="popup-title" class="text-xl font-bold text-gray-800 mb-2"></h3>
        <p id="popup-text" class="text-gray-600 mb-4"></p>
        <div class="flex gap-3">
          <button onclick="closePopup()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200">
            Bağla
          </button>
          <a id="popup-link" href="#" class="flex-1 py-3 bg-green-600 text-white rounded-xl font-medium text-center hover:bg-green-700 hidden">
            Ətraflı
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Main Content -->
<div id="main-content" class="min-h-screen pb-20">

  <!-- Hero Section -->
  <section id="hero-section" class="hero-gradient text-white relative overflow-hidden">
    <div class="absolute inset-0 opacity-20">
      <div class="absolute inset-0" style="background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'0.1\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>
    </div>
    
    <div class="relative px-6 py-12 md:py-16">
      <div class="max-w-4xl mx-auto text-center">
        <div id="restaurant-logo" class="w-24 h-24 bg-white/10 rounded-2xl mx-auto mb-6 flex items-center justify-center backdrop-blur hidden">
          <img src="" alt="Logo" class="w-20 h-20 object-contain">
        </div>
        
        <h1 id="hero-title" class="text-3xl md:text-5xl font-bold mb-4 leading-tight">
          Restoran Menyusu
        </h1>
        <p id="hero-subtitle" class="text-white/80 text-lg md:text-xl max-w-2xl mx-auto">
          Ən təzə məhsullar və möhtəşəm təamlar
        </p>
        
        <div id="hero-image-container" class="mt-8 hidden">
          <img id="hero-image" src="" class="w-full max-w-3xl mx-auto rounded-2xl shadow-2xl" alt="Hero">
        </div>
      </div>
    </div>
  </section>

  <!-- Banner Slider -->
  <section id="banner-section" class="px-4 py-6 hidden">
    <div class="max-w-6xl mx-auto">
      <h2 id="banner-title" class="text-xl font-bold text-gray-800 mb-4 hidden">Təkliflər</h2>
      <div class="banner-slider relative" id="banner-slider">
        <!-- Banners will be inserted here -->
      </div>
    </div>
  </section>

  <!-- Info Bar -->
  <section class="bg-white border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <div class="flex flex-wrap items-center justify-center gap-6 text-sm text-gray-600">
        <div class="flex items-center gap-2">
          <i class="fas fa-map-marker-alt text-green-600"></i>
          <span id="rest-address">Ünvan yüklənir...</span>
        </div>
        <div class="flex items-center gap-2">
          <i class="fas fa-clock text-green-600"></i>
          <span id="rest-hours">07:00 - 24:00</span>
        </div>
        <div class="flex items-center gap-2">
          <i class="fas fa-phone text-green-600"></i>
          <a id="rest-phone" href="tel:" class="hover:text-green-600">Telefon</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Search & Categories -->
  <section class="sticky-header py-4">
    <div class="max-w-6xl mx-auto px-4">
      <!-- Search -->
      <div class="relative mb-4">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input 
          type="text" 
          id="search-input" 
          placeholder="Yemək axtar..." 
          class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:border-green-500 focus:ring-2 focus:ring-green-200 outline-none transition-all"
          onkeyup="handleSearch()"
        >
      </div>
      
      <!-- Categories -->
      <div class="category-scroll flex gap-3 overflow-x-auto pb-2" id="categories-container">
        <button class="category-pill active px-5 py-2.5 rounded-full border-2 border-gray-200 bg-white text-gray-700 font-medium whitespace-nowrap" onclick="filterCategory('all')">
          Hamısı
        </button>
        <!-- Categories will be inserted here -->
      </div>
    </div>
  </section>

  <!-- Products Grid -->
  <section class="max-w-6xl mx-auto px-4 py-6">
    <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Products will be inserted here -->
    </div>
    
    <div id="no-results" class="hidden text-center py-16">
      <i class="fas fa-search text-6xl text-gray-300 mb-4"></i>
      <p class="text-gray-500 text-lg">Heç bir nəticə tapılmadı</p>
    </div>
  </section>

</div>

<!-- Smart Search Badge -->
<div id="smart-search-badge" class="search-badge hidden" onclick="startVoiceSearch()">
  <i class="fas fa-microphone"></i>
  <span>Ağıllı Axtarış</span>
</div>

<script>
const CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbzIbfA4tpJV89K6u28XioYLasvfMPBUC8jwVLDjK_1gf9q5PLWd1YnaWOy2jH6_sM4BbQ/exec'
};

let allData = {
  categories: [],
  products: [],
  settings: {}
};
let currentCategory = 'all';
let bannerInterval = null;

// Initialize
document.addEventListener('DOMContentLoaded', async () => {
  await loadMenuData();
  hideLoading();
  checkPopup();
});

async function loadMenuData() {
  try {
    const response = await fetch(`${CONFIG.GAS_URL}?action=getMenu&_=${Date.now()}`, {
      cache: 'no-store'
    });
    const result = await response.json();
    
    if (result.success && result.data) {
      allData = {
        categories: result.data.categories || [],
        products: result.data.products || [],
        settings: result.data.settings || {}
      };
      
      applySettings();
      renderCategories();
      renderProducts();
      initBannerSlider();
    }
  } catch (error) {
    console.error('Load error:', error);
    // Try to load from localStorage as fallback
    const saved = localStorage.getItem('menuData');
    if (saved) {
      allData = JSON.parse(saved);
      applySettings();
      renderCategories();
      renderProducts();
    }
  }
}

function hideLoading() {
  document.getElementById('loading-screen').classList.add('hidden');
}

function applySettings() {
  const s = allData.settings;
  
  // Restaurant name
  if (s.nameAz) {
    document.getElementById('hero-title').textContent = s.nameAz;
    document.title = s.nameAz + ' - Menyu';
  }
  
  // Hero subtitle
  if (s.heroTitleAz) {
    document.getElementById('hero-subtitle').textContent = s.heroTitleAz;
  }
  
  // Logo
  if (s.logo) {
    const logoContainer = document.getElementById('restaurant-logo');
    logoContainer.querySelector('img').src = s.logo;
    logoContainer.classList.remove('hidden');
  }
  
  // Hero image
  if (s.heroImage) {
    document.getElementById('hero-image').src = s.heroImage;
    document.getElementById('hero-image-container').classList.remove('hidden');
  }
  
  // Contact info
  if (s.addressAz) document.getElementById('rest-address').textContent = s.addressAz;
  if (s.phone) {
    document.getElementById('rest-phone').href = 'tel:' + s.phone;
    document.getElementById('rest-phone').textContent = s.phone;
  }
  if (s.workWeekday) document.getElementById('rest-hours').textContent = s.workWeekday;
  
  // Smart search badge
  if (s.smartSearchBadge === 'true') {
    document.getElementById('smart-search-badge').classList.remove('hidden');
  }
}

function renderCategories() {
  const container = document.getElementById('categories-container');
  const categories = allData.categories
    .filter(c => c.active !== false)
    .sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'category-pill px-5 py-2.5 rounded-full border-2 border-gray-200 bg-white text-gray-700 font-medium whitespace-nowrap';
    btn.innerHTML = `${cat.icon || '🍽️'} ${escapeHtml(cat.nameAz)}`;
    btn.onclick = () => filterCategory(cat.id);
    container.appendChild(btn);
  });
}

function filterCategory(catId) {
  currentCategory = catId;
  
  // Update active state
  document.querySelectorAll('.category-pill').forEach((btn, idx) => {
    if ((catId === 'all' && idx === 0) || 
        (catId !== 'all' && btn.textContent.includes(getCategoryName(catId)))) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
  
  renderProducts();
}

function getCategoryName(catId) {
  const cat = allData.categories.find(c => c.id == catId);
  return cat ? cat.nameAz : '';
}

function handleSearch() {
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('products-grid');
  const searchTerm = document.getElementById('search-input').value.toLowerCase();
  const noResults = document.getElementById('no-results');
  
  let products = allData.products.filter(p => p.available !== false);
  
  // Filter by category
  if (currentCategory !== 'all') {
    products = products.filter(p => p.categoryId == currentCategory);
  }
  
  // Filter by search
  if (searchTerm) {
    products = products.filter(p => 
      (p.nameAz || '').toLowerCase().includes(searchTerm) ||
      (p.nameEn || '').toLowerCase().includes(searchTerm) ||
      (p.descAz || '').toLowerCase().includes(searchTerm)
    );
  }
  
  // Sort: recommended first, then popular, then new
  products.sort((a, b) => {
    if (a.recommended && !b.recommended) return -1;
    if (!a.recommended && b.recommended) return 1;
    if (a.popular && !b.popular) return -1;
    if (!a.popular && b.popular) return 1;
    if (a.isNew && !b.isNew) return -1;
    return 0;
  });
  
  if (products.length === 0) {
    grid.innerHTML = '';
    noResults.classList.remove('hidden');
    return;
  }
  
  noResults.classList.add('hidden');
  
  grid.innerHTML = products.map(product => {
    const badges = [];
    if (product.recommended) badges.push('<span class="badge-recommended text-xs font-bold px-2 py-1 rounded-full">Tövsiyə</span>');
    if (product.popular) badges.push('<span class="badge-popular text-xs font-bold px-2 py-1 rounded-full">Populyar</span>');
    if (product.isNew) badges.push('<span class="badge-new text-xs font-bold px-2 py-1 rounded-full">Yeni</span>');
    
    const hasVideo = product.videoUrl && product.videoUrl.trim() !== '';
    const hasImages = product.images && product.images.length > 0;
    
    let imageHtml = '';
    if (hasImages) {
      const firstImage = product.images[0];
      imageHtml = `
        <div class="product-image-container relative aspect-[4/3] rounded-xl overflow-hidden bg-gray-100 cursor-pointer group">
          <img src="${firstImage}" 
               alt="${escapeHtml(product.nameAz)}" 
               class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
               onclick="openImageModal('${firstImage.replace(/'/g, "\\'")}')"
          >
          ${hasVideo ? `
            <div class="video-badge">
              <i class="fas fa-video"></i> Video
            </div>
            <div class="play-overlay" onclick="event.stopPropagation(); openVideoModal('${product.videoUrl.replace(/'/g, "\\'")}')">
              <div class="play-button">
                <i class="fas fa-play ml-1"></i>
              </div>
            </div>
          ` : ''}
        </div>
      `;
    } else if (hasVideo) {
      imageHtml = `
        <div class="product-image-container relative aspect-[4/3] rounded-xl overflow-hidden bg-gray-800 cursor-pointer" onclick="openVideoModal('${product.videoUrl.replace(/'/g, "\\'")}')">
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="play-button">
              <i class="fas fa-play ml-1"></i>
            </div>
          </div>
          <div class="video-badge">
            <i class="fas fa-video"></i> Video
          </div>
        </div>
      `;
    } else {
      imageHtml = `
        <div class="aspect-[4/3] rounded-xl bg-gray-100 flex items-center justify-center">
          <i class="fas fa-utensils text-4xl text-gray-300"></i>
        </div>
      `;
    }
    
    // Thumbnail gallery for multiple images
    let thumbnailsHtml = '';
    if (product.images && product.images.length > 1) {
      thumbnailsHtml = `
        <div class="flex gap-2 mt-2 overflow-x-auto pb-1">
          ${product.images.slice(0, 4).map((img, idx) => `
            <img src="${img}" 
                 class="w-12 h-12 rounded-lg object-cover cursor-pointer hover:ring-2 hover:ring-green-500 flex-shrink-0"
                 onclick="openImageModal('${img.replace(/'/g, "\\'")}')"
                 alt="Thumbnail ${idx + 1}"
            >
          `).join('')}
          ${product.images.length > 4 ? `<span class="w-12 h-12 rounded-lg bg-gray-100 flex items-center justify-center text-xs text-gray-500 flex-shrink-0">+${product.images.length - 4}</span>` : ''}
        </div>
      `;
    }
    
    return `
      <div class="product-card bg-white rounded-2xl shadow-sm overflow-hidden">
        ${imageHtml}
        ${thumbnailsHtml}
        
        <div class="p-5">
          <div class="flex gap-2 mb-2 flex-wrap">
            ${badges.join('')}
          </div>
          
          <h3 class="text-lg font-bold text-gray-800 mb-1">${escapeHtml(product.nameAz)}</h3>
          <p class="text-sm text-gray-500 mb-1">${escapeHtml(product.nameEn || '')}</p>
          
          ${product.descAz ? `<p class="text-sm text-gray-600 mb-3 line-clamp-2">${escapeHtml(product.descAz)}</p>` : ''}
          
          ${product.specs?.volume ? `<p class="text-xs text-gray-400 mb-3"><i class="fas fa-weight-hanging mr-1"></i>${escapeHtml(product.specs.volume)}</p>` : ''}
          
          <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
            <div>
              <span class="price-tag text-white px-4 py-2 rounded-xl font-bold text-lg">
                ${parseFloat(product.price || 0).toFixed(2)} ₼
              </span>
            </div>
            ${product.specs?.time ? `<span class="text-xs text-gray-400"><i class="fas fa-clock mr-1"></i>${escapeHtml(product.specs.time)}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// Image Modal
function openImageModal(src) {
  const modal = document.getElementById('image-modal');
  const img = document.getElementById('modal-image');
  img.src = src;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeImageModal() {
  const modal = document.getElementById('image-modal');
  modal.classList.remove('active');
  document.body.style.overflow = '';
}

// Video Modal
function openVideoModal(src) {
  const modal = document.getElementById('video-modal');
  const video = document.getElementById('modal-video');
  
  // Handle YouTube URLs
  const youtubeMatch = src.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\s]+)/);
  if (youtubeMatch) {
    const videoId = youtubeMatch[1];
    // For YouTube, we'd need to use iframe, but for now show message
    video.innerHTML = `<p class="text-white text-center p-8">YouTube videosu: <a href="${src}" target="_blank" class="text-green-400 underline">${src}</a></p>`;
  } else {
    video.innerHTML = `<source src="${src}" type="video/mp4">`;
    video.load();
    video.play();
  }
  
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeVideoModal() {
  const modal = document.getElementById('video-modal');
  const video = document.getElementById('modal-video');
  video.pause();
  modal.classList.remove('active');
  document.body.style.overflow = '';
}

// Banner Slider
function initBannerSlider() {
  const banners = allData.settings.bannerImages || [];
  const enabled = allData.settings.bannerEnabled;
  
  if (!enabled || banners.length === 0) return;
  
  const section = document.getElementById('banner-section');
  const slider = document.getElementById('banner-slider');
  const title = document.getElementById('banner-title');
  
  section.classList.remove('hidden');
  if (allData.settings.bannerTitle) {
    title.textContent = allData.settings.bannerTitle;
    title.classList.remove('hidden');
  }
  
  const activeBanners = banners.filter(b => b.active !== false);
  
  slider.innerHTML = activeBanners.map((banner, idx) => `
    <div class="banner-slide ${idx === 0 ? 'active' : ''}" data-slide="${idx}">
      <img src="${banner.image}" alt="${escapeHtml(banner.title || '')}" class="w-full h-48 md:h-64 object-cover">
    </div>
  `).join('');
  
  // Auto slide
  let currentSlide = 0;
  const interval = parseInt(allData.settings.bannerInterval) || 3000;
  
  bannerInterval = setInterval(() => {
    const slides = slider.querySelectorAll('.banner-slide');
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
  }, interval);
}

// Popup
function checkPopup() {
  const s = allData.settings;
  if (!s.popupEnabled) return;
  
  // Check if show once
  if (s.popupShowOnce && localStorage.getItem('popupShown')) return;
  
  setTimeout(() => {
    showPopup();
    if (s.popupShowOnce) {
      localStorage.setItem('popupShown', 'true');
    }
  }, 1000);
}

function showPopup() {
  const s = allData.settings;
  const modal = document.getElementById('popup-modal');
  
  if (s.popupImage) {
    document.getElementById('popup-image').src = s.popupImage;
    document.getElementById('popup-image').classList.remove('hidden');
  }
  
  document.getElementById('popup-title').textContent = s.popupTitle || 'Xüsusi Təklif';
  document.getElementById('popup-text').textContent = s.popupText || '';
  
  if (s.popupLink) {
    const linkBtn = document.getElementById('popup-link');
    linkBtn.href = s.popupLink;
    linkBtn.classList.remove('hidden');
  }
  
  modal.classList.add('active');
}

function closePopup() {
  document.getElementById('popup-modal').classList.remove('active');
}

// Voice Search (placeholder)
function startVoiceSearch() {
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    
    recognition.lang = 'az-AZ';
    recognition.start();
    
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      document.getElementById('search-input').value = transcript;
      handleSearch();
    };
  } else {
    alert('Brauzeriniz səsli axtarışı dəstəkləmir');
  }
}

// Utilities
function escapeHtml(text) {
  if (!text) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// Close modals on escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeImageModal();
    closeVideoModal();
    closePopup();
  }
});
